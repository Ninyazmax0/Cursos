<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base de Datos (SQL) - Status Code 418</title>
    <link rel="stylesheet" href="assets/css/tailwind.min.css">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/line-numbers/prism-line-numbers.css">
    <link rel="stylesheet" href="assets/css/auras.css">
    <!-- Firebase Modules -->
    <script type="module" src="assets/js/firebase-config.js"></script>
    <script type="module" src="assets/js/firebase-storage.js"></script>

    <script src="assets/js/course_system.js"></script>
    <script src="assets/js/dictionaries.js"></script>
    
    <!-- Monaco Editor Loader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>
    <!-- Theme Manager -->
    <script src="assets/js/theme-manager.js"></script>
    <style>
     :root {
         --background: #1a1b26;
         --foreground: #a9b1d6;
         --card-background: #24283b;
         --border: #414868;
         --accent: #7aa2f7;
         --accent-dark: #5a7edb;
         --accent-glow: rgba(122, 162, 247, 0.4);
         --green: #9ece6a;
         --green-glow: rgba(158, 206, 106, 0.4);
         --yellow: #e0af68;
         --yellow-glow: rgba(224, 175, 104, 0.4);
         --red: #f7768e;
         --purple: #bb9af7;
         --purple-glow: rgba(187, 154, 247, 0.4);
         --cyan: #73daca;
         --font-sans: 'Inter', sans-serif;
         --font-mono: 'JetBrains Mono', monospace;
     }

     * { box-sizing: border-box; }

     body {
         color: var(--foreground);
         font-family: var(--font-sans);
         margin: 0;
         padding: 0;
         position: relative;
         overflow-x: hidden;
     }

     /* ========== FONDO ANIMADO ========== */
     .background-container {
         position: fixed;
         top: 0;
         left: 0;
         width: 100%;
         height: 100%;
         z-index: -1;
         transition: opacity 0.5s ease;
     }

     .background-day, .background-night {
         position: absolute;
         top: 0;
         left: 0;
         width: 100%;
         height: 100%;
         background-size: cover;
         background-position: center;
         opacity: 0;
         transition: opacity 1s ease;
     }

     .background-day {
         background-image: url('https://i.pinimg.com/originals/71/f1/b9/71f1b924a56150104ec16828f2d31b7f.gif');
     }

     .background-night {
         background-image: url('https://i.pinimg.com/originals/4c/23/98/4c2398e6be397bb08b5cb70b2192d730.gif');
     }

     .dark .background-night { opacity: 1; }
     .background-day { opacity: 1; }

     /* ========== CONTENEDOR PRINCIPAL GLASSMORPHISM ========== */
     .content-box {
         position: fixed;
         inset: 0.75rem;
         background: rgba(26, 27, 38, 0.78);
         border: 1px solid rgba(122, 162, 247, 0.15);
         border-radius: 20px;
         padding: 0;
         box-shadow:
             0 25px 80px rgba(0, 0, 0, 0.6),
             0 0 60px rgba(122, 162, 247, 0.08),
             inset 0 1px 0 rgba(255, 255, 255, 0.04);
         backdrop-filter: blur(24px) saturate(1.2);
         display: flex;
         justify-content: center;
         align-items: center;
         overflow: hidden;
     }

     /* ========== PANELS ========== */
     .panel {
         display: none;
         animation: panelSlideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
         width: 100%;
         height: 100%;
     }

     .panel.active { display: flex; }

     @keyframes panelSlideIn {
         from { opacity: 0; transform: translateY(12px) scale(0.99); }
         to { opacity: 1; transform: translateY(0) scale(1); }
     }

     @keyframes fadeInUp {
         from { opacity: 0; transform: translateY(20px); }
         to { opacity: 1; transform: translateY(0); }
     }

     @keyframes glowPulse {
         0%, 100% { box-shadow: 0 0 15px var(--accent-glow); }
         50% { box-shadow: 0 0 30px var(--accent-glow), 0 0 60px rgba(122, 162, 247, 0.15); }
     }

     @keyframes shimmer {
         0% { background-position: -200% center; }
         100% { background-position: 200% center; }
     }

     @keyframes float {
         0%, 100% { transform: translateY(0); }
         50% { transform: translateY(-6px); }
     }

     /* ========== LEVEL SELECTION PANEL ========== */
     #level-selection-panel {
         padding: 1.5rem 2rem;
         overflow-y: auto;
         flex-direction: column;
         align-items: center;
     }

     #level-selection-panel::-webkit-scrollbar { width: 6px; }
     #level-selection-panel::-webkit-scrollbar-track { background: transparent; }
     #level-selection-panel::-webkit-scrollbar-thumb {
         background: var(--border);
         border-radius: 3px;
     }
     #level-selection-panel::-webkit-scrollbar-thumb:hover { background: var(--accent); }

     /* Header del curso */
     .course-header {
         text-align: center;
         margin-bottom: 1.5rem;
         animation: fadeInUp 0.6s ease;
     }

     .course-header h1 {
         font-size: 2.5rem;
         font-weight: 800;
         background: linear-gradient(135deg, var(--accent) 0%, var(--purple) 50%, var(--cyan) 100%);
         -webkit-background-clip: text;
         -webkit-text-fill-color: transparent;
         background-clip: text;
         margin-bottom: 0.5rem;
         letter-spacing: -0.02em;
     }

     .course-header p {
         color: var(--foreground);
         opacity: 0.6;
         font-size: 1rem;
         max-width: 500px;
         margin: 0 auto;
     }

     /* Barra de progreso general */
     .overall-progress {
         width: 100%;
         max-width: 600px;
         margin: 0 auto 2rem;
         animation: fadeInUp 0.7s ease;
     }

     .progress-stats {
         display: flex;
         justify-content: space-between;
         align-items: center;
         margin-bottom: 0.5rem;
         font-size: 0.85rem;
     }

     .progress-stats .label { color: var(--foreground); opacity: 0.7; }
     .progress-stats .value { color: var(--accent); font-weight: 700; font-family: var(--font-mono); }

     .progress-track {
         width: 100%;
         height: 8px;
         background: rgba(65, 72, 104, 0.5);
         border-radius: 99px;
         overflow: hidden;
         position: relative;
     }

     .progress-fill {
         height: 100%;
         border-radius: 99px;
         background: linear-gradient(90deg, var(--accent) 0%, var(--purple) 50%, var(--green) 100%);
         background-size: 200% 100%;
         transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
         position: relative;
     }

     .progress-fill::after {
         content: '';
         position: absolute;
         top: 0;
         left: 0;
         right: 0;
         bottom: 0;
         background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
         background-size: 200% 100%;
         animation: shimmer 2s ease infinite;
     }

     /* Secciones de niveles */
     .levels-section {
         width: 100%;
         max-width: 900px;
         animation: fadeInUp 0.8s ease;
     }

     .section-title {
         font-size: 1.1rem;
         font-weight: 700;
         color: var(--foreground);
         margin-bottom: 1rem;
         display: flex;
         align-items: center;
         gap: 0.5rem;
         text-transform: uppercase;
         letter-spacing: 0.05em;
     }

     .section-title i { color: var(--accent); }

     /* Grid de niveles */
     #level-grid {
         display: grid;
         grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
         gap: 1rem;
         width: 100%;
         margin-bottom: 2rem;
     }

     /* Nodos de nivel - Diseño tipo tarjeta cuadrada */
     .level-node {
         display: flex;
         flex-direction: column;
         align-items: center;
         justify-content: center;
         position: relative;
         cursor: pointer;
         background: rgba(36, 40, 59, 0.6);
         border: 1px solid var(--border);
         border-radius: 14px;
         padding: 1rem 0.5rem;
         transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
         aspect-ratio: 1;
         min-height: 100px;
     }

     .level-node::before {
         content: '';
         position: absolute;
         inset: -1px;
         border-radius: 15px;
         padding: 1px;
         background: linear-gradient(135deg, transparent 40%, var(--accent) 100%);
         -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
         mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
         -webkit-mask-composite: xor;
         mask-composite: exclude;
         opacity: 0;
         transition: opacity 0.3s ease;
     }

     .level-node.unlocked:hover::before { opacity: 1; }

     .level-node.unlocked:hover {
         transform: translateY(-4px) scale(1.04);
         border-color: var(--accent);
         background: rgba(122, 162, 247, 0.08);
         box-shadow: 0 8px 32px rgba(122, 162, 247, 0.15), 0 0 0 1px rgba(122, 162, 247, 0.1);
     }

     .level-node.locked {
         opacity: 0.4;
         cursor: not-allowed;
         background: rgba(36, 40, 59, 0.3);
     }

     .level-node.locked::before { display: none; }

     .level-node.completed {
         background: rgba(158, 206, 106, 0.06);
         border-color: rgba(158, 206, 106, 0.3);
     }

     .level-node.completed::before {
         background: linear-gradient(135deg, transparent 40%, var(--green) 100%);
         opacity: 0.5;
     }

     .level-icon-wrapper {
         width: 44px;
         height: 44px;
         border-radius: 12px;
         display: flex;
         align-items: center;
         justify-content: center;
         transition: all 0.3s ease;
         position: relative;
     }

     .level-node.unlocked .level-icon-wrapper {
         background: rgba(122, 162, 247, 0.12);
         color: var(--accent);
     }

     .level-node.unlocked:hover .level-icon-wrapper {
         background: var(--accent);
         color: var(--background);
         transform: scale(1.1);
     }

     .level-node.completed .level-icon-wrapper {
         background: rgba(158, 206, 106, 0.15);
         color: var(--green);
     }

     .level-node.locked .level-icon-wrapper {
         background: rgba(65, 72, 104, 0.3);
         color: var(--border);
     }

     .level-number {
         margin-top: 0.5rem;
         font-weight: 600;
         font-size: 0.75rem;
         color: var(--foreground);
         opacity: 0.8;
         text-align: center;
     }

     .level-node.locked .level-number { opacity: 0.4; }
     .level-node.completed .level-number { color: var(--green); }

     /* Estrellas de nivel completado */
     .level-stars {
         position: absolute;
         top: 6px;
         right: 6px;
         display: flex;
         gap: 1px;
     }

     .level-stars .star {
         width: 8px;
         height: 8px;
         color: var(--yellow);
     }

     /* Candado overlay */
     .lock-badge {
         position: absolute;
         top: 6px;
         right: 6px;
         opacity: 0.5;
     }

     .lock-badge i { width: 12px; height: 12px; }

     /* ========== LEARNING PATH CONNECTOR ========== */
     .level-connector {
         display: none; /* Hidden on grid layout */
     }

     /* ========== LESSION PANEL ========== */
     #lesson-panel {
         padding: 0;
         flex-direction: column;
     }

     #lesson-panel .lesson-wrapper {
         display: flex;
         flex-direction: column;
         height: 100%;
         width: 100%;
         max-width: 100%;
     }

     #lesson-panel header {
         display: flex;
         align-items: center;
         justify-content: space-between;
         padding: 1rem 1.5rem;
         background: rgba(36, 40, 59, 0.5);
         border-bottom: 1px solid rgba(65, 72, 104, 0.4);
         flex-shrink: 0;
     }

     #lesson-panel header h2 {
         font-size: 1.25rem;
         font-weight: 700;
         color: var(--foreground);
         margin: 0;
     }

     #close-lesson-btn {
         background: rgba(65, 72, 104, 0.3);
         border: 1px solid var(--border);
         border-radius: 10px;
         padding: 0.5rem;
         color: var(--foreground);
         cursor: pointer;
         transition: all 0.2s;
     }

     #close-lesson-btn:hover {
         background: rgba(247, 118, 142, 0.15);
         border-color: var(--red);
         color: var(--red);
     }

     .lesson-progress-container {
         padding: 0 1.5rem;
         flex-shrink: 0;
     }

     .progress-bar-bg {
         background-color: rgba(65, 72, 104, 0.4);
         border-radius: 999px;
         height: 4px;
         overflow: hidden;
     }

     .progress-bar-fill {
         background: linear-gradient(90deg, var(--accent), var(--purple));
         height: 100%;
         border-radius: 999px;
         transition: width 0.5s cubic-bezier(0.16, 1, 0.3, 1);
     }

     #lesson-content {
         flex-grow: 1;
         overflow-y: auto;
         padding: 1.5rem;
     }

     #lesson-content::-webkit-scrollbar { width: 6px; }
     #lesson-content::-webkit-scrollbar-track { background: transparent; }
     #lesson-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

     #lesson-panel footer {
         display: flex;
         justify-content: space-between;
         align-items: center;
         padding: 1rem 1.5rem;
         background: rgba(36, 40, 59, 0.5);
         border-top: 1px solid rgba(65, 72, 104, 0.4);
         flex-shrink: 0;
     }

     #lesson-step {
         font-family: var(--font-mono);
         font-size: 0.85rem;
         color: var(--foreground);
         opacity: 0.6;
     }

     /* ========== QUIZ PANEL ========== */
     #quiz-panel {
         padding: 1.5rem;
         overflow-y: auto;
         flex-direction: column;
         align-items: center;
     }

     #quiz-panel::-webkit-scrollbar { width: 6px; }
     #quiz-panel::-webkit-scrollbar-track { background: transparent; }
     #quiz-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

     #quiz-panel .quiz-wrapper {
         width: 100%;
         max-width: 700px;
     }

     #quiz-panel header {
         margin-bottom: 1.5rem;
     }

     #quiz-level-title {
         font-size: 1.5rem;
         font-weight: 700;
         color: var(--foreground);
         margin-bottom: 0.25rem;
     }

     #quiz-progress {
         font-family: var(--font-mono);
         font-size: 0.9rem;
         color: var(--accent);
         background: rgba(122, 162, 247, 0.1);
         padding: 0.25rem 0.75rem;
         border-radius: 8px;
         border: 1px solid rgba(122, 162, 247, 0.2);
     }

     #quiz-question {
         font-size: 1.2rem;
         line-height: 1.5;
         color: var(--foreground);
         margin-bottom: 1.5rem;
     }

     /* ========== RESULTS PANEL ========== */
     #results-panel {
         padding: 2rem;
         flex-direction: column;
         align-items: center;
         justify-content: center;
         text-align: center;
     }

     #results-icon {
         width: 80px;
         height: 80px;
         margin-bottom: 1.5rem;
     }

     #results-title {
         font-size: 2rem;
         font-weight: 800;
         margin-bottom: 0.75rem;
     }

     #results-score {
         font-size: 1.25rem;
         font-family: var(--font-mono);
         color: var(--accent);
         margin-bottom: 0.5rem;
     }

     #results-message {
         color: var(--foreground);
         opacity: 0.7;
         margin-bottom: 2rem;
     }

     /* ========== BUTTONS ========== */
     .btn-primary {
         background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
         color: white;
         padding: 0.65rem 1.5rem;
         border-radius: 10px;
         font-weight: 600;
         font-size: 0.9rem;
         border: none;
         cursor: pointer;
         transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
         box-shadow: 0 2px 8px rgba(122, 162, 247, 0.25);
         display: inline-flex;
         align-items: center;
         gap: 0.4rem;
     }

     .btn-primary:hover {
         transform: translateY(-2px);
         box-shadow: 0 6px 20px rgba(122, 162, 247, 0.35);
     }

     .btn-primary:active { transform: translateY(0); }

     .btn-primary:disabled {
         opacity: 0.4;
         cursor: not-allowed;
         transform: none;
         box-shadow: none;
     }

     .btn-secondary {
         background: rgba(65, 72, 104, 0.4);
         color: var(--foreground);
         padding: 0.65rem 1.5rem;
         border-radius: 10px;
         font-weight: 600;
         font-size: 0.9rem;
         border: 1px solid var(--border);
         cursor: pointer;
         transition: all 0.25s ease;
     }

     .btn-secondary:hover {
         background: rgba(65, 72, 104, 0.6);
         border-color: var(--accent);
     }

     /* ========== QUIZ OPTIONS ========== */
     .quiz-option {
         border: 1px solid rgba(65, 72, 104, 0.5);
         background: rgba(36, 40, 59, 0.4);
         color: var(--foreground);
         padding: 1rem 1.25rem;
         border-radius: 12px;
         cursor: pointer;
         transition: all 0.2s ease;
         text-align: left;
         width: 100%;
         user-select: none;
         font-size: 0.95rem;
         display: flex;
         align-items: center;
         gap: 0.75rem;
     }

     .quiz-option .option-letter {
         width: 28px;
         height: 28px;
         border-radius: 8px;
         display: flex;
         align-items: center;
         justify-content: center;
         font-weight: 700;
         font-size: 0.8rem;
         background: rgba(122, 162, 247, 0.1);
         color: var(--accent);
         border: 1px solid rgba(122, 162, 247, 0.2);
         flex-shrink: 0;
         transition: all 0.2s;
     }

     .quiz-option:hover:not(.disabled) {
         border-color: var(--accent);
         background: rgba(122, 162, 247, 0.08);
         transform: translateX(4px);
     }

     .quiz-option:hover:not(.disabled) .option-letter {
         background: var(--accent);
         color: var(--background);
     }

     .quiz-option.correct {
         border-color: var(--green);
         background: rgba(158, 206, 106, 0.08);
         color: var(--green);
     }

     .quiz-option.correct .option-letter {
         background: var(--green);
         color: var(--background);
         border-color: var(--green);
     }

     .quiz-option.incorrect {
         border-color: var(--red);
         background: rgba(247, 118, 142, 0.08);
         color: var(--red);
     }

     .quiz-option.incorrect .option-letter {
         background: var(--red);
         color: white;
         border-color: var(--red);
     }

     .quiz-option.disabled {
         pointer-events: none;
         opacity: 0.5;
     }

     /* ========== CODE BLOCKS ========== */
     .code-block {
         background-color: #1a1b26;
         border: 1px solid rgba(65, 72, 104, 0.5);
         color: #c0caf5;
         font-family: var(--font-mono);
         border-radius: 14px;
         margin-top: 1rem;
         overflow: hidden;
         box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
     }

     .code-block-header {
         background: rgba(36, 40, 59, 0.8);
         padding: 0.6rem 1rem;
         display: flex;
         align-items: center;
         gap: 0.5rem;
         border-bottom: 1px solid rgba(65, 72, 104, 0.3);
     }

     .code-block-header span {
         width: 11px;
         height: 11px;
         border-radius: 50%;
     }

     .code-block-header .bg-red-500 { background-color: #ff5f56; }
     .code-block-header .bg-yellow-500 { background-color: #ffbd2e; }
     .code-block-header .bg-green-500 { background-color: #27c93f; }

     .code-block pre {
         margin: 0;
         padding: 1rem 1.25rem;
         white-space: pre;
         overflow-x: auto;
         background: #1a1b26;
         position: relative;
     }

     .code-block pre code {
         font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
         font-size: 0.88rem;
         line-height: 1.7;
         tab-size: 4;
         display: block;
         position: relative;
         color: #c0caf5;
     }

     .code-block pre code::before {
         content: '';
         position: absolute;
         left: 0;
         top: 0;
         bottom: 0;
         width: 100%;
         pointer-events: none;
         background-image:
             repeating-linear-gradient(
                 90deg,
                 transparent 0px,
                 transparent 2rem,
                 rgba(122, 162, 247, 0.06) 2rem,
                 rgba(122, 162, 247, 0.06) calc(2rem + 1px),
                 transparent calc(2rem + 1px),
                 transparent 4rem,
                 rgba(255, 158, 100, 0.06) 4rem,
                 rgba(255, 158, 100, 0.06) calc(4rem + 1px),
                 transparent calc(4rem + 1px),
                 transparent 6rem,
                 rgba(158, 206, 106, 0.06) 6rem,
                 rgba(158, 206, 106, 0.06) calc(6rem + 1px),
                 transparent calc(6rem + 1px),
                 transparent 8rem,
                 rgba(187, 154, 247, 0.06) 8rem,
                 rgba(187, 154, 247, 0.06) calc(8rem + 1px),
                 transparent calc(8rem + 1px),
                 transparent 10rem
             );
     }

     .code-block.with-line-numbers pre {
         padding-left: 3.5rem;
         counter-reset: line;
     }

     .code-block.with-line-numbers pre code .line::before {
         counter-increment: line;
         content: counter(line);
         position: absolute;
         left: -2.5rem;
         width: 2rem;
         text-align: right;
         color: #565f89;
         font-size: 0.8rem;
     }

     .code-block pre::-webkit-scrollbar { height: 6px; }
     .code-block pre::-webkit-scrollbar-track { background: #1a1b26; border-radius: 3px; }
     .code-block pre::-webkit-scrollbar-thumb { background: #414868; border-radius: 3px; }
     .code-block pre::-webkit-scrollbar-thumb:hover { background: #565f89; }

     .code-block .language-html .tag,
     .code-block .language-css .at-rule,
     .code-block .language-javascript .keyword { color: var(--accent); }
     .code-block .language-html .string,
     .code-block .language-css .string,
     .code-block .language-javascript .string { color: var(--green); }
     .code-block .language-css .property,
     .code-block .language-javascript .property { color: var(--yellow); }
     .code-block .language-html .comment,

                "codigo": "-- No ejecutes esto, solo visualízalo:\n-- Edad: INT\n-- Email: VARCHAR(255)\n-- Activo: BOOLEAN",
                "tourSteps": [
                    {
                        "text": "VARCHAR es amigable con la RAM: Si reservas 255 pero usas 10, solo gasta espacio para 10.",
                        "line": 3
                    }
                ]
            }
        ],
        "quiz": [
            {
                "type": "multiple-choice",
                "question": "¿Qué estructura es el bloque angular fundamental para alojar registros en bases relacionales?",
                "options": [
                    "Tabla",
                    "JSON File",
                    "Árbol Binario",
                    "Cola (Queue)"
                ],
                "answer": "Tabla"
            }
        ]
    },
    {
        "title": "Nivel 2: Exploración de Datos (SELECT)",
        "lesson": [
            {
                "title": "La anatomía del SELECT",
                "dialogo": "<p>Dominar SQL es dominar el mandato <code class='text-accent'>SELECT</code>. Su propósito es únicamente LEER y proyectar datos; jamás modifica la base.</p><p>Sintaxis base: <code>SELECT [columnas] FROM [tabla];</code></p>",
                "codigo": "SELECT * FROM empleados;\nSELECT nombre, email FROM empleados;",
                "tourSteps": [
                    {
                        "text": "El comodín asterisco (*) es el destructor de rendimiento; trae columnas que ni siquiera sabías que existían. Úsalo con cuidado.",
                        "line": 1
                    },
                    {
                        "text": "Práctica recomendada: Solo pide las columnas que tu backend realmente necesita procesar.",
                        "line": 2
                    }
                ]
            }
        ],
        "quiz": [
            {
                "type": "multiple-choice",
                "question": "¿Qué comando base lanza peticiones de lectura hacia el disco del motor de base de datos relacional?",
                "options": [
                    "GET DATA",
                    "READ",
                    "SELECT",
                    "PULL FROM"
                ],
                "answer": "SELECT"
            }
        ]
    },
    {
        "title": "Nivel 3: El Poder del Filtro (WHERE)",
        "lesson": [
            {
                "title": "Aislando Variables",
                "dialogo": "<p>De nada sirve traer 1 millón de filas si solo buscabas la tuya. La claúsula <code class='text-accent'>WHERE</code> instruye al motor a aplicar máscaras lógicas a cada fila antes de retornarla.</p>",
                "codigo": "SELECT * FROM facturas \nWHERE estado = 'PAGADA' \nAND total >= 500.00;",
                "tourSteps": [
                    {
                        "text": "A diferencia de la mayoría de lenguajes, la igualdad estricta es un solo signo igual (=).",
                        "line": 2
                    },
                    {
                        "text": "Los operadores booleanos (AND, OR, NOT) permiten tejer condiciones extremadamente modulares.",
                        "line": 3
                    }
                ]
            }
        ],
        "quiz": [
            {
                "type": "multiple-choice",
                "question": "¿Cuál es el operador lógico usado para forzar que MS SQL sume y exija dos condiciones a la vez?",
                "options": [
                    "&&",
                    "AND",
                    "PLUS",
                    "BOTH"
                ],
                "answer": "AND"
            }
        ]
    },
    {
        "title": "Nivel 4: Ordenamiento y Límites",
        "lesson": [
            {
                "title": "Controlando el Caos",
                "dialogo": "<p>Las tablas en BBDD carecen de \"orden natural\" garantizado. A menos que ordenes la vista, el motor entregará filas como le parezca más rápido en su puntero físico.</p>",
                "codigo": "SELECT nombre, puntaje \nFROM jugadores \nWHERE baneado = FALSE \nORDER BY puntaje DESC \nLIMIT 10;",
                "tourSteps": [
                    {
                        "text": "ORDER BY es el arquitecto visual. Toma una columna y dictamina su régimen (ASC o DESC).",
                        "line": 4
                    },
                    {
                        "text": "LIMIT salva servidores. Intercepta la salida justo cuando alcanza su cota y apaga el escáner.",
                        "line": 5
                    }
                ]
            }
        ],
        "quiz": [
            {
                "type": "multiple-choice",
                "question": "¿Qué sucede si no usas ORDER BY explícitamente?",
                "options": [
                    "Error Sintáctico",
                    "Ordena por el ID automáticamente (Depende motor)",
                    "El orden no es determinista, fluctúa según operaciones físicas del disco",
                    "El último insertado va primero"
                ],
                "answer": "El orden no es determinista, fluctúa según operaciones físicas del disco"
            }
        ]
    },
    {
        "title": "Nivel 5: Inyectando Vida (INSERT)",
        "lesson": [
            {
                "title": "Tu primer Registro Físico",
                "dialogo": "<p>A diferencia del SELECT, usar <code class='text-green-400'>INSERT INTO</code> escribe bytes directamente en el almacenamiento persistente del servidor maestro.</p>",
                "codigo": "INSERT INTO alumnos (nombre, generacion, activo)\nVALUES ('Steven', 2026, TRUE);",
                "tourSteps": [
                    {
                        "text": "Se declara explícitamente el mapa de memoria (nombre de columnas).",
                        "line": 1
                    },
                    {
                        "text": "La lista de VALUES debe calzar 1 a 1 en tipo de datos y orden con la declaración superior. Cualquier desviación disparará un fatal exception.",
                        "line": 2
                    }
                ]
            }
        ],
        "quiz": [
            {
                "type": "multiple-choice",
                "question": "¿Qué le ocurre a una columna que permitía valores NULL si la omites intencionalmente de la lista del INSERT?",
                "options": [
                    "Genera Syntax Error",
                    "Asume cero (0) o Default",
                    "La ignora y le inyecta silenciosamente un estado NULL de sistema",
                    "Fuerza un Warning que deshace la transición"
                ],
                "answer": "La ignora y le inyecta silenciosamente un estado NULL de sistema"
            }
        ]
    },
    {
        "title": "Nivel 6: Modificaciones Quirúrgicas (UPDATE)",
        "lesson": [
            {
                "title": "Reescribiendo la Realidad",
                "dialogo": "<p>El comando <code class='text-yellow-400'>UPDATE</code> altera datos in-place en el disco de manera permanente. Un descuido aquí puede liquidar 10 años de datos en tu empresa si olvidas tu WHERE.</p>",
                "codigo": "UPDATE inventario\nSET precio = precio * 1.15, modificado_en = CURRENT_TIMESTAMP\nWHERE stock < 10;",
                "tourSteps": [
                    {
                        "text": "Se puede usar el valor anterior (precio) de forma atómica para calcular el nuevo estado dentro del bloque SET.",
                        "line": 2
                    },
                    {
                        "text": "¡El Seguro de Vida! Filtra para que el 15% de aumento solo aplique a los ítems casi agotados.",
                        "line": 3
                    }
                ]
            }
        ],
        "quiz": [
            {
                "type": "multiple-choice",
                "question": "¿Qué pasaría si ejecutaramos un UPDATE sin el segmento WHERE sobre una tabla de 10 millones de filas?",
                "options": [
                    "Se cancelaría temporalmente.",
                    "Manda advertencia",
                    "SQL procesará un parche que sobreescribirá la columna de las 10 millones de filas enteras",
                    "Sólo apuntará a la que contenga PK 1"
                ],
                "answer": "SQL procesará un parche que sobreescribirá la columna de las 10 millones de filas enteras"
            }
        ]
    },
    {
        "title": "Nivel 7: La Cuchilla del Motor (DELETE vs TRUNCATE)",
        "lesson": [
            {
                "title": "Destrucción Controlada",
                "dialogo": "<p>Hay dos formas de podar tableros masivos en un diseño RDBMS, <code>DELETE</code> y <code>TRUNCATE</code>. Aunque suenan símiles, uno de ellos escupe fuego, el otro es un cuchillo atómico.</p>",
                "codigo": "DELETE FROM sesiones_expiradas\nWHERE usuario = 'Anon';\n\n-- TRUNCATE log_accesos;",
                "tourSteps": [
                    {
                        "text": "DELETE escanea cada fila lentamente, evaluando triggers e informando bloqueos al transaction log. Es seguro y reversible por un microsegundo.",
                        "line": 1
                    },
                    {
                        "text": "TRUNCATE (comentado por seguridad) aniquila todo el formato crudo directamente borrando la tabla y rehaciéndola vacía a hiper-velocidad, sin mirar atrás.",
                        "line": 4
                    }
                ]
            }
        ],
        "quiz": [
            {
                "type": "multiple-choice",
                "question": "A nivel rendimiento con tablas gigantes donde no requieres backup físico... ¿Qué operador es astronómicamente más veloz destruyendo su integridad?",
                "options": [
                    "DELETE FROM *",
                    "TRUNCATE TABLE",
                    "DROP Y CREATE OVERRIDE",
                    "FORMAT ALL"
                ],
                "answer": "TRUNCATE TABLE"
            }
        ]
    },
    {
        "title": "Nivel 8: Arquitecturas Fuertes (Primary Keys)",
        "lesson": [
            {
                "title": "Identidad Fundamental",
                "dialogo": "<p>Manejar tablas sin <code class='text-accent'>PRIMARY KEY</code> es tan peligroso como un gobierno sin pasaportes. Una PK garantiza matemáticamente que en un mar de millones, solo existe **un único identificador irremplazable**.</p>",
                "codigo": "CREATE TABLE pasaportes (\n  curp VARCHAR(18) PRIMARY KEY,\n  dueño VARCHAR(100)\n);",
                "tourSteps": [
                    {
                        "text": "La instrucción mágica PRIMARY KEY es un cerrojo biónico a nivel de infraestructura estructural que dispara un Constraint indexado invisible. Ningún duplicado de id sobrevivirá esta comprobación.",
                        "line": 2
                    }
                ]
            }
        ],
        "quiz": [
            {
                "type": "multiple-choice",
                "question": "¿Una llave primaria admite valores marcados explícitamente en modo NULL o ausentes de relleno por código insert?",
                "options": [
                    "Sí, pero no es recomendable.",
                    "Es materialmente imposible, desencadena contramedida automática ERROR_NULL_CONSTRAINT por base del índice subyacente obligando la inserción de valor unívoco siempre.",
                    "Sí solo en MySQL.",
                    "Dará warning y auto completará."
                ],
                "answer": "Es materialmente imposible, desencadena contramedida automática ERROR_NULL_CONSTRAINT por base del índice subyacente obligando la inserción de valor unívoco siempre."
            }
        ]
    },
    {
        "title": "Nivel 9: El Matrimonio (Foreign Keys)",
        "lesson": [
            {
                "title": "Integridad Referencial",
                "dialogo": "<p>¿Ves esos IDs regados por todos lados? Para conectar Usuarios con los Carritos que les pertenecen, usamos Referencias Foráneas (<code class='text-cyan-400'>FOREIGN KEYS</code>).</p>",
                "codigo": "CREATE TABLE facturas (\n  id_factura INT PRIMARY KEY,\n  cliente_id INT,\n  FOREIGN KEY (cliente_id) REFERENCES clientes(id)\n);",
                "tourSteps": [
                    {
                        "text": "La FK evita orfandad: Un usuario no puede ser borrado de la tabla principal 'clientes' mientras haya una factura apuntando mortalmente hacia él unless cascade deletes prove otherwise.",
                        "line": 4
                    }
                ]
            }
        ],
        "quiz": [
            {
                "type": "multiple-choice",
                "question": "¿A qué denominamos 'ON DELETE CASCADE' sobre las FKs en DB design avanzado?",
                "options": [
                    "Si el padre en tabla maestra muere... la base de datos se borra en cascada format loop",
                    "Si borramos el PK de Usuario, sus ForeignKeys ancladas a sus registros dependientes caerán eliminadas de manera paralela controlada sin fallar constraint",
                    "Se guarda en un bucket paralelo",
                    "Genera nulos."
                ],
                "answer": "Si borramos el PK de Usuario, sus ForeignKeys ancladas a sus registros dependientes caerán eliminadas de manera paralela controlada sin fallar constraint"
            }
        ]
    },
    {
        "title": "Nivel 10: Cruzando Océanos (INNER JOIN)",
        "lesson": [
            {
                "title": "Intersección",
                "dialogo": "<p>Ha llegado el rey oscuro de la analítica. <code>JOIN</code> se acopla entre dos entidades diferentes combinándolas horizontalmente cuando un atributo matchéan (típicamente PK == FK).</p>",
                "codigo": "SELECT u.nombre, p.titulo \nFROM usuarios u\nINNER JOIN posts p ON u.id = p.autor_id;",
                "tourSteps": [
                    {
                        "text": "Declaramos alias usando la primer letra ('u' para usuarios) para acortar querys masivas.",
                        "line": 2
                    },
                    {
                        "text": "INNER ignora a huérfanos. Si un usuario no posee post, desaparece del return final de resultados.",
                        "line": 3
                    }
                ]
            }
        ],
        "quiz": [
            {
                "type": "multiple-choice",
                "question": "¿Qué característica base domina a un clásico comportamiento INNER JOIN?",
                "options": [
                    "Retorna siempre toda base matriz izquierda obligadamente unida",
                    "Retornará a la salida de la selectura solo aquellas filas donde el operador lógico ON en ambos polos registre un match idéntico existencial descartando los que no cruzan",
                    "Elimina datos duplicados",
                    "Sobrescribe foreign key param constraint"
                ],
                "answer": "Retornará a la salida de la selectura solo aquellas filas donde el operador lógico ON en ambos polos registre un match idéntico existencial descartando los que no cruzan"
            }
        ]
    },

document.addEventListener('DOMContentLoaded', async () => {
    // Dynamic Import to ensure Firebase is loaded before proceeding
    let firebaseTools;
    try {
        firebaseTools = await import('./assets/js/firebase-config.js');
    } catch(e) {
        console.error("Critical: Failed to load Firebase.", e);
        // Intentar continuar sin Firebase en modo offline
        console.warn(' Continuando en modo offline (sin sincronización con Firestore)');
        
        // Cargar datos desde localStorage
        const localSession = JSON.parse(localStorage.getItem('currentUser'));
        if (!localSession || !localSession.id) {
            console.warn(' Sesión inválida en Database Course.');
            window.location.href = 'index.html';
            return;
        }
        
        // Cargar progreso desde localStorage
        const savedProgress = localStorage.getItem('databaseCourseProgress');
        if (savedProgress) {
            try {
                userProgress = JSON.parse(savedProgress);
            } catch (e) {
                console.error(' Error parsing saved progress:', e);
                userProgress = { completedLevels: [], quizScores: {} };
            }
        } else {
            console.log('🆕 Inicializando progreso database vacío.');
            userProgress = { completedLevels: [], quizScores: {} };
        }
        
        // Renderizar interfaz
        if (window.renderLevelSelection) renderLevelSelection();
        if (window.showPanel) showPanel('levelSelection');
        return;
    }
    
    // Extract functions
    const { showLoading, hideLoading, checkConnection, getUserFromFirestore } = firebaseTools;
    
    if (!checkConnection()) return;
    if (showLoading) showLoading('Sincronizando curso database...');
    
    const localSession = JSON.parse(localStorage.getItem('currentUser'));
    if (!localSession || !localSession.id) {
        console.warn(' Sesión inválida en Database Course.');
        window.location.href = 'index.html';
        return;
    }
    
    try {
        if (getUserFromFirestore) {
            const firestoreUser = await getUserFromFirestore(localSession.id);
            if (!firestoreUser) throw new Error('Usuario no encontrado en DB.');
            
            // Sync Local State
            if (firestoreUser.databaseProgress) {
                userProgress = firestoreUser.databaseProgress;
                // Defaults
                if (!userProgress.completedLevels) userProgress.completedLevels = [];
                if (!userProgress.quizScores) userProgress.quizScores = {};
            } else {
                console.log('🆕 Inicializando progreso database vacío.');
                userProgress = { completedLevels: [], quizScores: {} };
            }
            
            // Update Session Cache
            localStorage.setItem('currentUser', JSON.stringify(firestoreUser));
            localStorage.setItem('databaseCourseProgress', JSON.stringify(userProgress));
        }
        
        // Initial Render
        if (window.renderLevelSelection) renderLevelSelection();
        if (window.showPanel) showPanel('levelSelection');
        
        
        
        if (hideLoading) hideLoading();
        
    } catch (e) {
        console.error(' Error Init database:', e);
        
        // Solo redirigir si es un error crítico (no de Pyodide/postMessage)
        if (e.message && !e.message.includes('postMessage') && !e.message.includes('Pyodide')) {
            alert('Error cargando curso: ' + e.message);
            window.location.href = 'menu_inicio.html';
        } else {
            console.warn(' Error no crítico de Pyodide - continuando con la carga del curso');
            // Intentar renderizar de todos modos
            if (window.renderLevelSelection) renderLevelSelection();
            if (window.showPanel) showPanel('levelSelection');
            if (hideLoading) hideLoading();
        }
    }
});

async function saveProgress() {
    // 1. Update Global wrapper variable if needed (userProgress IS valid here)
    // 2. Sync to Firebase
    const currentUser = JSON.parse(localStorage.getItem('currentUser') || '{}');
    if (currentUser.id && window.updateCourseProgress) {
        
        // Prepare payload
        const progressPayload = {
            ...userProgress,
            lastUpdated: new Date().toISOString()
        };
        
        // Optimistic Cache Update
        currentUser.databaseProgress = progressPayload;
        localStorage.setItem('currentUser', JSON.stringify(currentUser));
        // localStorage.setItem('databaseCourseProgress', ...) -> Removed per user request (Strict Firebase)
        
        try {
            await window.updateCourseProgress(currentUser.id, 'databaseProgress', progressPayload);
            console.log(' Python Progress Saved to Firestore');
        } catch (e) {
            console.error(' Error saving database progress:', e);
        }
    }
}

function renderLevelSelection() {
    const levelGrid = document.getElementById('level-grid');
    if (!levelGrid) return;
    
    levelGrid.innerHTML = '';
    levelGrid.style.cssText = 'display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 0.9rem; width: 100%; max-width: 860px; margin-bottom: 2rem;';
    levelGrid.className = '';
    
    if (!userProgress.completedLevels) {
        userProgress.completedLevels = [];
    }
    
    const totalLevels = courseData.length;
    const completedCount = userProgress.completedLevels.length;
    const progressPercent = Math.round((completedCount / totalLevels) * 100);
    
    // Actualizar barra de progreso general
    const progressBar = document.getElementById('overall-progress-bar');
    const progressText = document.getElementById('overall-progress-text');
    if (progressBar) progressBar.style.width = progressPercent + '%';
    if (progressText) progressText.textContent = `${completedCount}/${totalLevels} niveles`;
    
    courseData.forEach((level, index) => {
        const isUnlocked = index === 0 || userProgress.completedLevels.includes(index - 1);
        const isCompleted = userProgress.completedLevels.includes(index);
        
        const levelNode = document.createElement('div');
        levelNode.className = `level-node ${isUnlocked ? 'unlocked' : 'locked'} ${isCompleted ? 'completed' : ''}`;
        
        // Ribbon para niveles completados
        if (isCompleted) {
            const ribbon = document.createElement('div');
            ribbon.className = 'status-ribbon';
            ribbon.innerText = 'HECHO';
            levelNode.appendChild(ribbon);
        }
        
        // Icono dinámico brillante
        const iconDiv = document.createElement('div');
        iconDiv.className = 'node-icon';
        const iconName = isCompleted ? 'check-circle' : isUnlocked ? 'play-circle' : 'lock';
        iconDiv.innerHTML = `<i data-lucide="${iconName}"></i>`;
        levelNode.appendChild(iconDiv);
        
        // Información del nivel
        const infoDiv = document.createElement('div');
        infoDiv.className = 'flex flex-col items-center gap-1';
        infoDiv.innerHTML = `
            <span class="node-number">Nivel ${index + 1}</span>
            <div class="node-title">${level.title}</div>
        `;
        levelNode.appendChild(infoDiv);
        
        if (isUnlocked) {
            levelNode.onclick = () => startLevel(index);
        }
        
        levelGrid.appendChild(levelNode);
    });
    
    if (window.lucide) window.lucide.createIcons();
}

                                        options: { isWholeLine: true, className: 'bg-blue-500/30 border-l-4 border-blue-500' }
                                    }));
                                    window.lessonMainMonacoEditor.deltaDecorations([], decorations);
                                }, 100);
                            }
                        });

                codePanel.classList.add('hidden');

    // 5. Actualizar barra de progreso y botones
    document.getElementById('lesson-step').textContent = `${currentLessonStep + 1} / ${levelData.lesson.length}`;
    const progress = ((currentLessonStep + 1) / levelData.lesson.length) * 100;

function renderMultipleChoice() {
    const container = document.getElementById('multiple-choice-container');
    container.classList.remove('hidden');
    container.innerHTML = '';

    // Crear letras fijas en orden a, b, c, d
    const letters = ['a', 'b', 'c', 'd'];

    // Barajar las opciones antes de asignarlas a las letras
    const shuffledOptions = [...currentQuizData.options].sort(() => Math.random() - 0.5);

    // Crear opciones con letras fijas pero contenido aleatorio
    letters.forEach((letter, index) => {
        const optionButton = document.createElement('button');
        optionButton.textContent = `${letter}) ${shuffledOptions[index]}`;
        optionButton.className = 'quiz-option p-4 rounded-lg text-left';
        optionButton.dataset.answer = shuffledOptions[index];
        optionButton.dataset.isCorrect = shuffledOptions[index] === currentQuizData.answer ? 'true' : 'false';
        optionButton.onclick = () => {
            // Verificar si la respuesta es correcta y actualizar el score
            if (optionButton.dataset.isCorrect === 'true') {
                score++;
            }
            // Avanzar a la siguiente pregunta
            currentQuizQuestion++;
            if (currentQuizQuestion < courseData[currentLevel].quiz.length) {
                renderQuizQuestion();
            } else {
                showResults();
            }
        };
        container.appendChild(optionButton);
    });
}

function renderCodeCompletion() {

function renderDragDrop() {
    const container = document.getElementById('drag-drop-container');
    container.classList.remove('hidden');

    // Barajar opciones
    const shuffledOptions = [...currentQuizData.options].sort(() => Math.random() - 0.5);

    // Crear área de opciones
    const optionsArea = document.createElement('div');
    optionsArea.className = 'drag-drop-options';
    optionsArea.innerHTML = '<h4 class="text-sm font-semibold mb-2">Opciones:</h4>';

    shuffledOptions.forEach(option => {
        const optionElement = document.createElement('div');
        optionElement.className = 'drag-option';
        optionElement.textContent = option;
        optionElement.draggable = true;
        optionElement.addEventListener('dragstart', handleDragStart);
        optionsArea.appendChild(optionElement);
    });

    // Crear área de destino
    const targetsArea = document.createElement('div');
    targetsArea.className = 'drag-drop-targets';
    targetsArea.innerHTML = '<h4 class="text-sm font-semibold mb-2">Arrastra aquí en orden:</h4>';

    currentQuizData.correctOrder.forEach(() => {
        const targetElement = document.createElement('div');
        targetElement.className = 'drag-target';
        targetElement.addEventListener('dragover', handleDragOver);
        targetElement.addEventListener('drop', handleDrop);
        targetsArea.appendChild(targetElement);
    });

    // Limpiar y agregar elementos
    container.innerHTML = '';
    container.appendChild(optionsArea);

function handleDragStart(e) {
    e.dataTransfer.setData('text/plain', e.target.textContent);
}

function handleDragOver(e) {
    e.preventDefault();
}

function handleDrop(e) {
    e.preventDefault();
    const data = e.dataTransfer.getData('text/plain');
    const target = e.target.closest('.drag-target');

    if (target && !target.querySelector('.drag-option')) {
        const optionElement = document.createElement('div');
        optionElement.className = 'drag-option';
        optionElement.textContent = data;
        optionElement.draggable = false;
        target.appendChild(optionElement);
        target.classList.add('occupied');

        // Guardar respuesta
        const targetIndex = Array.from(target.parentNode.children).indexOf(target);
        userAnswers[targetIndex] = data;
    }
}

function renderMatching() {
    const container = document.getElementById('matching-container');
    container.classList.remove('hidden');
    container.innerHTML = '';

    // Barajar pares
    const shuffledPairs = [...currentQuizData.pairs].sort(() => Math.random() - 0.5);

    // Crear columnas
    const conceptsColumn = document.createElement('div');
    const descriptionsColumn = document.createElement('div');

    conceptsColumn.innerHTML = '<h4 class="text-sm font-semibold mb-2">Conceptos:</h4>';
    descriptionsColumn.innerHTML = '<h4 class="text-sm font-semibold mb-2">Descripciones:</h4>';

    shuffledPairs.forEach(pair => {
        const conceptElement = document.createElement('div');
        conceptElement.className = 'matching-item';
        conceptElement.textContent = pair.concept;
        conceptElement.dataset.concept = pair.concept;
        conceptElement.addEventListener('click', () => selectMatchingItem(conceptElement, 'concept'));
        conceptsColumn.appendChild(conceptElement);

        const descriptionElement = document.createElement('div');
        descriptionElement.className = 'matching-item';
        descriptionElement.textContent = pair.description;
        descriptionElement.dataset.concept = pair.concept;
        descriptionElement.addEventListener('click', () => selectMatchingItem(descriptionElement, 'description'));
        descriptionsColumn.appendChild(descriptionElement);
    });

    container.appendChild(conceptsColumn);
    container.appendChild(descriptionsColumn);
}

let selectedConcept = null;
let selectedDescription = null;

function selectMatchingItem(element, type) {
    if (type === 'concept') {
        // Deseleccionar concepto anterior
        if (selectedConcept) {
            selectedConcept.classList.remove('selected');
        }

        selectedConcept = element;
        element.classList.add('selected');
    } else {
        // Deseleccionar descripción anterior
        if (selectedDescription) {
            selectedDescription.classList.remove('selected');
        }

        selectedDescription = element;
        element.classList.add('selected');
    }

    // Si ambos están seleccionados, verificar si coinciden
    if (selectedConcept && selectedDescription) {
        if (selectedConcept.dataset.concept === selectedDescription.dataset.concept) {
            // Coinciden - marcarlos como emparejados
            selectedConcept.classList.remove('selected');
            selectedConcept.classList.add('matched');
            selectedDescription.classList.remove('selected');
            selectedDescription.classList.add('matched');

            // Guardar emparejamiento
            userAnswers[selectedConcept.dataset.concept] = true;

            // Resetear selección
            selectedConcept = null;
            selectedDescription = null;
        } else {
            // No coinciden - quitar selección después de un breve momento
            setTimeout(() => {
                selectedConcept.classList.remove('selected');
                selectedDescription.classList.remove('selected');
                selectedConcept = null;
                selectedDescription = null;
            }, 1000);
        }
    }
}

function renderOrdering() {
    const container = document.getElementById('ordering-container');
    container.classList.remove('hidden');
    container.innerHTML = '';

    // Barajar pasos
    const shuffledSteps = [...currentQuizData.steps].sort(() => Math.random() - 0.5);

    shuffledSteps.forEach(step => {
        const stepElement = document.createElement('div');
        stepElement.className = 'ordering-item';
        stepElement.draggable = true;
        stepElement.dataset.step = step;

        const handleElement = document.createElement('div');
        handleElement.className = 'ordering-handle';
        handleElement.innerHTML = '<i data-lucide="grip-vertical"></i>';

        stepElement.appendChild(handleElement);
        stepElement.appendChild(document.createTextNode(step));

        stepElement.addEventListener('dragstart', handleOrderingDragStart);
        stepElement.addEventListener('dragover', handleOrderingDragOver);
        stepElement.addEventListener('drop', handleOrderingDrop);
        stepElement.addEventListener('dragend', handleOrderingDragEnd);

        container.appendChild(stepElement);
    });

    setTimeout(() => lucide.createIcons(), 100);
}

let draggedElement = null;

function handleOrderingDragStart(e) {
    draggedElement = e.target;
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/html', e.target.outerHTML);
    e.target.classList.add('dragging');
}

function handleOrderingDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';

    const target = e.target.closest('.ordering-item');
    if (target && target !== draggedElement) {
        const rect = target.getBoundingClientRect();
        const next = (e.clientY - rect.top) / (rect.bottom - rect.top) > 0.5;
        container.insertBefore(draggedElement, next ? target.nextSibling : target);
    }
}

function handleOrderingDrop(e) {
    e.preventDefault();
}

function handleOrderingDragEnd(e) {
    e.target.classList.remove('dragging');

    // Guardar orden actual
    userAnswers.order = Array.from(document.querySelectorAll('.ordering-item')).map(item => item.dataset.step);
}

function renderErrorFinding() {
    const container = document.getElementById('error-finding-container');
    container.classList.remove('hidden');

    // Crear contenedor de código con áreas clickeables para errores
    const codeContainer = document.createElement('div');
    codeContainer.className = 'error-code';

    // Dividir el código en líneas
    const lines = currentQuizData.code.split('\n');

    lines.forEach((line, lineIndex) => {
        const lineElement = document.createElement('div');
        lineElement.className = 'flex';

        // Número de línea
        const lineNumber = document.createElement('div');
        lineNumber.className = 'w-8 text-right pr-2 text-gray-500 select-none';
        lineNumber.textContent = lineIndex + 1;
        lineElement.appendChild(lineNumber);

        // Contenido de la línea
        const lineContent = document.createElement('div');
        lineContent.className = 'flex-1 relative';
        lineContent.innerHTML = `<code class="language-sql">${line}</code>`;

        // Agregar áreas clickeables para errores en esta línea
        currentQuizData.errors.forEach(error => {
            if (error.line === lineIndex + 1) {
                const errorSpot = document.createElement('div');
                errorSpot.className = 'error-spot';
                errorSpot.style.left = `${error.start}ch`;
                errorSpot.style.width = `${error.end - error.start}ch`;
                errorSpot.style.height = '1.2em';
                errorSpot.style.top = '0';
                errorSpot.dataset.description = error.description;
                errorSpot.addEventListener('click', () => markErrorFound(errorSpot, error.description));
                lineContent.appendChild(errorSpot);
            }
        });

        lineElement.appendChild(lineContent);
        codeContainer.appendChild(lineElement);
    });

    container.innerHTML = '';
    container.appendChild(codeContainer);

    // Resaltar sintaxis
    setTimeout(() => Prism.highlightAll(), 100);
}

function markErrorFound(errorSpot, description) {
    if (!errorSpot.classList.contains('found')) {
        errorSpot.classList.add('found');
        foundErrors.push(description);
        userAnswers.foundErrors = foundErrors;
    }
}

function checkAnswer() {
    let isCorrect = false;
    const feedback = document.getElementById('quiz-feedback');

    switch(currentQuizType) {
        case "multiple-choice":
            isCorrect = userAnswers.selected === currentQuizData.answer;
            break;
        case "code-completion":
            isCorrect = Object.values(userAnswers).includes(currentQuizData.answer);
            break;
        case "drag-drop":
            const userOrder = Object.values(userAnswers);
            isCorrect = JSON.stringify(userOrder) === JSON.stringify(currentQuizData.correctOrder);
            break;
        case "matching":
            isCorrect = Object.keys(userAnswers).length === currentQuizData.pairs.length;
            break;
        case "ordering":
            isCorrect = JSON.stringify(userAnswers.order) === JSON.stringify(currentQuizData.correctOrder);
            break;
        case "error-finding":
            isCorrect = foundErrors.length === currentQuizData.errors.length;
            break;
    }

    // Mostrar feedback
    feedback.textContent = isCorrect ?
        "¡Correcto! " + (currentQuizData.explanation || "Buen trabajo.") :
        "Incorrecto. " + (currentQuizData.explanation || "Inténtalo de nuevo.");
    feedback.className = `quiz-feedback ${isCorrect ? 'correct' : 'incorrect'}`;
    feedback.classList.remove('hidden');

    // Si es correcto, avanzar después de un breve retraso
    if (isCorrect) {
        setTimeout(() => {
            currentQuizQuestion++;
            if (currentQuizQuestion < courseData[currentLevel].quiz.length) {
                renderQuizQuestion();
            } else {
                showResults();
            }
        }, 2000);
    }
}

function showResults() {
    const totalQuestions = courseData[currentLevel].quiz.length;
    const passed = score >= (totalQuestions * 0.7);
    const percentage = Math.round((score / totalQuestions) * 100);

    // Save Score logic
    if (userProgress.quizScores === undefined) userProgress.quizScores = {};
    if (userProgress.quizScores[currentLevel] === undefined || score > userProgress.quizScores[currentLevel]) {
        userProgress.quizScores[currentLevel] = score;
        saveProgress();
        saveQuizScore(score, courseData[currentLevel].quiz.length, COURSE_ID, currentLevel + 1);
    }

    const resultsTitle = document.getElementById('results-title');
    const resultsScore = document.getElementById('results-score');
    const resultsMessage = document.getElementById('results-message');
    const resultsIcon = document.getElementById('results-icon');
    const nextLevelBtn = document.getElementById('next-level-btn');

    resultsScore.textContent = `Puntuacion: ${score}/${totalQuestions} (${percentage}%)`;

    if (passed) {
        resultsTitle.textContent = 'Felicidades!';
        resultsTitle.style.color = 'var(--green)';
        resultsMessage.textContent = 'Has aprobado el cuestionario.';
        resultsIcon.setAttribute('data-lucide', 'award');
        resultsIcon.style.color = 'var(--green)';
        nextLevelBtn.classList.remove('hidden');
        markLevelCompleted(currentLevel);
        
        // --- ACHIEVEMENTS ---
        try {
            import('./assets/js/achievements.js').then(m => {
                if (currentLevel === 0) m.checkAchievement('first_blood');
                if (score === courseData[currentLevel].quiz.length) m.checkAchievement('quiz_genius');
            });
        } catch(e) {}

        // Show Next Level Button
        showNextLevelButton(currentLevel);

    } else {
        resultsTitle.textContent = 'Intentalo de nuevo!';
        resultsTitle.style.color = 'var(--red)';
        resultsMessage.textContent = 'Necesitas al menos 70% para aprobar.';
        resultsIcon.setAttribute('data-lucide', 'refresh-cw');
        resultsIcon.style.color = 'var(--red)';
        nextLevelBtn.classList.add('hidden');
    }
    
    lucide.createIcons();
    showPanel('results');
    
    // Desbloquear chat después del quiz (Removed)
    // document.getElementById('chat-toggle-btn').style.display = 'block';
}

let selectedCommand = null;

function initializeClickToPlace() {
    // Remove existing event listeners to avoid duplicates
    document.querySelectorAll('.command-item').forEach(item => {
        item.removeEventListener('click', handleCommandSelect);
        item.addEventListener('click', handleCommandSelect);
    });

    // Make drop zones clickable for placement
    document.querySelectorAll('.drop-zone').forEach(zone => {
        zone.removeEventListener('click', handleZoneClick);
        zone.addEventListener('click', handleZoneClick);
    });

    // Reset buttons - only add if they exist
    const resetBtn1 = document.getElementById('reset-fill-1');
    const resetBtn2 = document.getElementById('reset-fill-2');
    if (resetBtn1) {
        resetBtn1.removeEventListener('click', () => resetFill(1));

        resetBtn2.removeEventListener('click', () => resetFill(2));
        resetBtn2.addEventListener('click', () => resetFill(2));
    }
}

function handleCommandSelect(e) {
    // Remove previous selection
    document.querySelectorAll('.command-item.selected').forEach(item => {
        item.classList.remove('selected');
    });

    // Select this command
    selectedCommand = e.target.dataset.command;
    e.target.classList.add('selected');

    // Add visual feedback - command follows mouse
    document.addEventListener('mousemove', followMouse);
}

function followMouse(e) {
    if (selectedCommand) {
        const selectedElement = document.querySelector('.command-item.selected');
        if (selectedElement) {
            // Create floating element that follows mouse
            let floatingElement = document.getElementById('floating-command');
            if (!floatingElement) {
                floatingElement = document.createElement('div');
                floatingElement.id = 'floating-command';
                floatingElement.className = 'fixed bg-blue-500 text-white px-3 py-1 rounded shadow-lg pointer-events-none z-50';
                floatingElement.textContent = selectedCommand;
                document.body.appendChild(floatingElement);
            }
            floatingElement.style.left = (e.clientX + 10) + 'px';
            floatingElement.style.top = (e.clientY + 10) + 'px';
        }
    }
}

function handleZoneClick(e) {
    if (selectedCommand && !e.currentTarget.dataset.value) {
        const dropZone = e.currentTarget;

        // Clear previous content
        dropZone.textContent = '';

        // Add the command
        const commandSpan = document.createElement('span');
        commandSpan.textContent = selectedCommand;
        commandSpan.className = 'bg-blue-500 text-white px-2 py-1 rounded text-sm';
        dropZone.appendChild(commandSpan);

        // Store the value
        dropZone.dataset.value = selectedCommand;

        // Hide the selected item
        const selectedItem = document.querySelector('.command-item.selected');
        if (selectedItem) {
            selectedItem.style.display = 'none';
            selectedItem.classList.remove('selected');
        }

        // Remove floating element
        const floatingElement = document.getElementById('floating-command');
        if (floatingElement) {
            floatingElement.remove();
        }

        // Clear selection
        selectedCommand = null;
        document.removeEventListener('mousemove', followMouse);
    }
}

function resetFill(exerciseNum) {
    // Reset drop zones
    document.querySelectorAll(`#practice-content .drop-zone`).forEach(zone => {
        zone.textContent = '';
        zone.dataset.value = '';
        zone.style.backgroundColor = '';
    });

    // Show all command items
    document.querySelectorAll('.command-item').forEach(item => {
        item.style.display = 'inline-block';
        item.style.opacity = '1';
    });

    // Reset feedback
    const feedback = document.getElementById(`fill-feedback-${exerciseNum}`);
    feedback.innerHTML = '';

    // Reset counter
    const counterElement = document.getElementById(`command-counter-fill-${exerciseNum}`);
    if (counterElement) {
        counterElement.textContent = `Completados: 0/${counterElement.textContent.split('/')[1]}`;
    }
}

function checkFill(exerciseNum) {
    const answers = {
        1: ['input', 'int', 'input', 'f'],
        2: ['float', 'input', 'float', 'input', 'f', 'if', 'f', 'elif', 'f', 'else']
    };

    const correct = answers[exerciseNum];
    let allCorrect = true;
    const feedback = document.getElementById(`fill-feedback-${exerciseNum}`);

    // Check drop zones instead of inputs
    const dropZones = document.querySelectorAll(`#practice-content .drop-zone`);
    dropZones.forEach((zone, index) => {
        const value = zone.dataset.value || '';
        if (value === correct[index]) {
            zone.style.borderColor = 'green';
            zone.style.backgroundColor = 'rgba(158, 206, 106, 0.1)';
        } else {
            zone.style.borderColor = 'red';
            zone.style.backgroundColor = 'rgba(247, 118, 142, 0.1)';
            allCorrect = false;
        }
    });

    if (allCorrect) {
        feedback.innerHTML = '<span style="color: green;">¡Excelente! Todos los huecos están correctos.</span>';
        updateFillCounter(exerciseNum, true);
    } else {
        feedback.innerHTML = '<span style="color: red;">Algunos huecos están incorrectos. Revisa y vuelve a intentar.</span>';
        updateFillCounter(exerciseNum, false);
    }
}

function updateFillCounter(exerciseNum, success) {
    const counterElement = document.getElementById(`command-counter-fill-${exerciseNum}`);
    if (counterElement) {
        const total = parseInt(counterElement.textContent.split('/')[1]);
        let current = parseInt(counterElement.textContent.split(':')[1].split('/')[0]);
        if (success && current < total) {
            current = total; // Mark as completed when all correct
        }
        counterElement.textContent = `Completados: ${current}/${total}`;
    }
}

// Crear componente de consola interactiva con Monaco
function createInteractiveConsole(codeOrBase64, containerId, isBase64 = false) {

    if (isBase64) {

        } catch (e) {
            console.error("Error decoding Base64 code:", e);
            code = "# Error cargando código base";
        }
    }

    const consoleHTML = `
        <div class="python-interactive-container grid grid-cols-1 lg:grid-cols-2 gap-4 h-[500px]">
            <!-- Panel de Código (Monaco) -->
            <div class="code-display-panel flex flex-col h-full border-r border-gray-700/50">
                <div class="code-display-header flex justify-between items-center p-2 bg-gray-900/50">
                    <div class="flex items-center gap-2">
                        <div class="dots flex gap-1">
                            <span class="dot w-3 h-3 rounded-full bg-red-500"></span>
                            <span class="dot w-3 h-3 rounded-full bg-yellow-500"></span>
                            <span class="dot w-3 h-3 rounded-full bg-green-500"></span>
                        </div>
                        <span class="text-xs font-bold text-gray-400 ml-2">main.py</span>
                    </div>
                    <span class="text-xs text-gray-500 bg-gray-800 px-2 py-1 rounded border border-gray-700">Read Only</span>
                </div>
                <!-- Container para Monaco -->
                <div id="monaco-${containerId}" class="flex-1 w-full min-h-0 overflow-hidden"></div>
            </div>

            <!-- Panel de Consola -->
            <div class="console-panel flex flex-col h-full bg-[#1a1b26]">
                <div class="console-header flex justify-between items-center p-2 border-b border-gray-700/50">
                    <div class="title flex items-center gap-2 text-gray-300 text-sm font-mono">
                        <i data-lucide="terminal" class="w-4 h-4"></i>
                        Terminal
                    </div>
                    <div class="console-controls flex gap-2">
                         <button class="console-btn console-btn-run flex items-center gap-1 px-3 py-1 bg-green-600 hover:bg-green-700 text-white rounded text-xs transition-colors" onclick="runSqlCode('${containerId}')">
                            <i data-lucide="play" class="w-3 h-3"></i>
                            Ejecutar
                        </button>
                        <button class="console-btn console-btn-clear p-1 hover:bg-gray-700 rounded text-gray-400 transition-colors" onclick="clearConsole('${containerId}')" title="Limpiar">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
                <div class="console-output flex-1 p-4 overflow-y-auto font-mono text-sm" id="${containerId}-output">
                    <div class="console-line info text-gray-500">>>> Esperando ejecución...</div>
                </div>
                <div class="console-input-prompt hidden flex items-center p-2 border-t border-gray-700/50 bg-gray-900/30" id="${containerId}-input-prompt">
                    <span class="text-yellow-500 mr-2 font-mono">>>></span>
                    <input type="text" class="console-input-field bg-transparent border-none outline-none text-white w-full font-mono text-sm" id="${containerId}-input" placeholder="Escribe aquí..." />
                </div>
            </div>
        </div>
    `;

    container.innerHTML = consoleHTML;
    
    if (window.lucide) lucide.createIcons();

    // Setup input handler
    const inputField = document.getElementById(`${containerId}-input`);
    if (inputField) {
        // Evitar duplicados usando flag en dataset en lugar de clonar
        if (inputField.dataset.listenerAttached === 'true') {
            return;
        }
        
        inputField.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const value = inputField.value;
                console.log(`[Python Console] Input submitted for ${containerId}: "${value}"`);
                
                // Usar resolver específico del contenedor
                if (window.consoleInputResolvers && window.consoleInputResolvers[containerId]) {
                    window.consoleInputResolvers[containerId](value);
                    delete window.consoleInputResolvers[containerId];
                } else {
                    console.warn(`[Python Console] No resolver found for ${containerId}. Input ignored.`);
                }
                
                inputField.value = '';
                document.getElementById(`${containerId}-input-prompt`).classList.add('hidden');

        });
        
        inputField.dataset.listenerAttached = 'true';

    // Inicializar Monaco Editor
    if (!monacoRequireConfigured) {
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs' }});

    require(['vs/editor/editor.main'], function() {
        // Define themes first
        if (window.themeManager) window.themeManager.defineCustomThemes();

        const userTheme = user.preferredTheme || 'vs-dark';

             window.monacoEditors[containerId] = monaco.editor.create(editorElement, {

                padding: { top: 10 },
                readOnly: true, // USER REQUEST: Prevent modification
