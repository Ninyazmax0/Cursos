<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clasificación Global - Status Code 418</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script type="module" src="assets/js/firebase-config.js"></script>
    <link rel="stylesheet" href="assets/css/theme.css">
    <link rel="stylesheet" href="assets/css/auras.css">
    <style>
        :root {
            --bg: #0f1016;
            --bg-secondary: #1a1b26;
            --accent: #7aa2f7;
            --accent-purple: #bb9af7;
            --success: #9ece6a;
            --gold: #e0af68;
            --silver: #c0caf5;
            --bronze: #cf7553;
            --border: #414868;
        }

        body {
            background: var(--bg);
            color: #c0caf5;
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Background */
        .background-container {
            position: fixed;
            inset: 0;
            z-index: -1;
        }

        .background-night {
            position: absolute;
            inset: 0;
            background-image: url('https://i.pinimg.com/originals/4c/23/98/4c2398e6be397bb08b5cb70b2192d730.gif');
            background-size: cover;
            background-position: center;
            opacity: 1;
        }

        /* Main Glass Panel */
        .main-glass-panel {
            position: fixed;
            inset: 1.5rem;
            background: rgba(26, 27, 38, 0.75);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(122, 162, 247, 0.2);
            border-radius: 24px;
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Top Bar */
        .top-bar {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid rgba(65, 72, 104, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(36, 40, 59, 0.5);
        }

        /* Content Area */
        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            gap: 2rem;
        }

        .content-area::-webkit-scrollbar {
            width: 8px;
        }

        .content-area::-webkit-scrollbar-track {
            background: rgba(65, 72, 104, 0.2);
            border-radius: 4px;
        }

        .content-area::-webkit-scrollbar-thumb {
            background: rgba(122, 162, 247, 0.5);
            border-radius: 4px;
        }

        /* Podium */
        .podium-container {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 2rem;
            margin-bottom: 3rem;
            height: 300px;
        }

        .podium-place {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            transition: transform 0.3s;
        }

        .podium-place:hover {
            transform: translateY(-10px);
        }

        .podium-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid;
            margin-bottom: 1rem;
            position: relative;
            overflow: hidden;
            background: var(--bg-secondary);
        }

        .podium-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .rank-1 .podium-avatar {
            width: 120px;
            height: 120px;
            border-color: var(--gold);
            box-shadow: 0 0 30px rgba(224, 175, 104, 0.6);
        }

        .rank-2 .podium-avatar {
            border-color: var(--silver);
            box-shadow: 0 0 20px rgba(192, 202, 245, 0.4);
        }

        .rank-3 .podium-avatar {
            border-color: var(--bronze);
            box-shadow: 0 0 20px rgba(207, 117, 83, 0.4);
        }

        .podium-card {
            background: rgba(36, 40, 59, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid;
            border-radius: 16px;
            padding: 1.5rem;
            text-align: center;
            min-width: 150px;
        }

        .rank-1 .podium-card {
            border-color: var(--gold);
            background: linear-gradient(135deg, rgba(224, 175, 104, 0.2), rgba(36, 40, 59, 0.8));
        }

        .rank-2 .podium-card {
            border-color: var(--silver);
        }

        .rank-3 .podium-card {
            border-color: var(--bronze);
        }

        .medal {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .rank-badge {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.25rem;
            margin: 0 auto 0.5rem;
        }

        .rank-1 .rank-badge {
            background: linear-gradient(135deg, #e0af68, #f7d794);
            color: #1a1b26;
        }

        .rank-2 .rank-badge {
            background: linear-gradient(135deg, #a0a8cc, #c0caf5);
            color: #1a1b26;
        }

        .rank-3 .rank-badge {
            background: linear-gradient(135deg, #cf7553, #e8a082);
            color: #1a1b26;
        }

        /* Leaderboard List */
        .leaderboard-list {
            flex: 1;
        }

        .leaderboard-item {
            background: rgba(36, 40, 59, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(65, 72, 104, 0.5);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: all 0.3s;
        }

        .leaderboard-item:hover {
            background: rgba(122, 162, 247, 0.1);
            border-color: var(--accent);
            transform: translateX(8px);
        }

        .rank-number {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: rgba(122, 162, 247, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.125rem;
            color: var(--accent);
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            overflow: hidden;
            background: var(--bg-secondary);
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-weight: 600;
            font-size: 1rem;
            color: white;
            margin-bottom: 0.25rem;
        }

        .user-level {
            font-size: 0.75rem;
            color: #9aa5ce;
        }

        .user-xp {
            font-weight: 700;
            font-size: 1.125rem;
            color: var(--success);
            margin-right: 1rem;
        }

        .level-badge {
            background: rgba(122, 162, 247, 0.2);
            border: 1px solid var(--accent);
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--accent);
        }

        /* Stats Sidebar */
        .stats-sidebar {
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .stat-card {
            background: rgba(36, 40, 59, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(65, 72, 104, 0.5);
            border-radius: 16px;
            padding: 1.5rem;
        }

        .stat-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
            color: #9aa5ce;
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: white;
        }

        .stat-label {
            font-size: 0.875rem;
            color: #9aa5ce;
            margin-top: 0.25rem;
        }

        .glass-button {
            background: rgba(122, 162, 247, 0.1);
            border: 1px solid rgba(122, 162, 247, 0.3);
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--accent);
            font-weight: 600;
            text-align: center;
        }

        .glass-button:hover {
            background: rgba(122, 162, 247, 0.2);
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .rank-arrow {
            color: var(--success);
        }

        .rank-arrow.down {
            color: #f7768e;
        }
    </style>
</head>
<body>
    <!-- Background -->
    <div class="background-container">
        <div class="background-night"></div>
    </div>

    <!-- Main Glass Panel -->
    <div class="main-glass-panel">
        <!-- Top Bar -->
        <div class="top-bar">
            <div class="flex items-center gap-4">
                <button onclick="window.location.href='menu_inicio.html'" class="glass-button flex items-center gap-2">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i>
                    Volver
                </button>
                <div>
                    <h1 class="text-3xl font-bold text-white">Clasificación Global</h1>
                    <p class="text-sm text-gray-400">Compite con los mejores estudiantes</p>
                </div>
            </div>
            <button id="theme-toggle" class="glass-button">
                <i data-lucide="moon" class="w-5 h-5"></i>
            </button>
        </div>

        <!-- Content Area -->
        <div class="content-area">
            <!-- Main Content -->
            <div class="leaderboard-list">
                <!-- Podium -->
                <div class="podium-container" id="podium">
                    <!-- Will be filled by JS -->
                </div>

                <!-- Rankings List -->
                <h3 class="text-xl font-bold text-white mb-4 flex items-center gap-2">
                    <i data-lucide="list" class="w-5 h-5 text-accent"></i>
                    Rankings Completos
                </h3>
                <div id="rankings-list">
                    <!-- Will be filled by JS -->
                </div>
            </div>

            <!-- Stats Sidebar -->
            <div class="stats-sidebar">
                <!-- Your Rank -->
                <div class="stat-card">
                    <div class="stat-header">
                        <i data-lucide="target" class="w-4 h-4"></i>
                        Tu Ranking
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="stat-value" id="your-rank">-</div>
                        <i data-lucide="trending-up" class="w-6 h-6 rank-arrow" id="rank-arrow"></i>
                    </div>
                    <div class="stat-label">de <span id="total-users">0</span> estudiantes</div>
                </div>

                <!-- Total XP -->
                <div class="stat-card">
                    <div class="stat-header">
                        <i data-lucide="zap" class="w-4 h-4 text-yellow-400"></i>
                        Total XP
                    </div>
                    <div class="stat-value text-yellow-400" id="your-xp">0</div>
                    <div class="stat-label">Puntos de experiencia</div>
                </div>

                <!-- Achievements -->
                <div class="stat-card">
                    <div class="stat-header">
                        <i data-lucide="trophy" class="w-4 h-4 text-purple-400"></i>
                        Logros
                    </div>
                    <div class="stat-value text-purple-400" id="your-achievements">0</div>
                    <div class="stat-label">de 60 desbloqueados</div>
                </div>

                <!-- View All Button -->
                <button onclick="window.location.href='logros.html'" class="glass-button">
                    Ver Todos los Logros
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { listenToUsers, getUserFromFirestore } from './assets/js/firebase-config.js';

        lucide.createIcons();

        let currentUser = null;
        let allUsers = [];

        // Initialize
        async function init() {
            const localSession = JSON.parse(localStorage.getItem('currentUser'));
            if (localSession && localSession.id) {
                currentUser = await getUserFromFirestore(localSession.id);
            }

            // Listen to users
            listenToUsers((users) => {
                allUsers = users;
                renderLeaderboard(users);
            });
        }

        function renderLeaderboard(users) {
            // Filter out admins (Steven and Amelia)
            const filteredUsers = users.filter(user => {
                const name = user.name?.toLowerCase() || '';
                return name !== 'steven' && name !== 'amelia';
            });

            // Calculate XP for each user
            const usersWithXP = filteredUsers.map(user => {
                const xp = calculateTotalXP(user);
                return { ...user, totalXP: xp };
            });

            // Sort by XP
            const sorted = usersWithXP.sort((a, b) => b.totalXP - a.totalXP);

            // Render podium (top 3)
            renderPodium(sorted.slice(0, 3));

            // Render list (4+)
            renderList(sorted.slice(3));

            // Update stats
            if (currentUser) {
                updateStats(sorted);
            }
        }

        function calculateTotalXP(user) {
            let xp = 0;
            
            // XP from courses
            ['webProgress', 'pythonProgress', 'rubyProgress', 'databaseProgress'].forEach(key => {
                const progress = user[key];
                if (progress && progress.completedLevels) {
                    xp += progress.completedLevels.length * 100;
                }
            });

            // XP from achievements
            if (user.achievements) {
                xp += Object.keys(user.achievements).length * 50;
            }

            return xp;
        }

        function renderPodium(top3) {
            const podium = document.getElementById('podium');
            if (top3.length === 0) {
                podium.innerHTML = '<p class="text-gray-400">No hay datos disponibles</p>';
                return;
            }

            const order = [1, 0, 2]; // 2nd, 1st, 3rd
            podium.innerHTML = order.map(i => {
                if (!top3[i]) return '';
                const user = top3[i];
                const rank = i + 1;
                const medals = ['🥇', '🥈', '🥉'];
                
                return `
                    <div class="podium-place rank-${rank}">
                        <div class="podium-avatar avatar-aura-container ${user.equippedAura || ''}">
                            <img src="${user.avatar || 'https://ui-avatars.com/api/?name=' + user.name}" alt="${user.name}">
                        </div>
                        <div class="podium-card">
                            <div class="rank-badge">${rank}</div>
                            <div class="medal">${medals[i]}</div>
                            <div class="text-white font-bold text-lg mb-1">${user.name}</div>
                            <div class="text-success font-bold text-xl">${user.totalXP.toLocaleString()} XP</div>
                        </div>
                    </div>
                `;
            }).join('');

            lucide.createIcons();
        }

        function renderList(users) {
            const list = document.getElementById('rankings-list');
            if (users.length === 0) {
                list.innerHTML = '';
                return;
            }

            list.innerHTML = users.map((user, index) => {
                const rank = index + 4;
                const isCurrentUser = currentUser && user.id === currentUser.id;
                
                return `
                    <div class="leaderboard-item ${isCurrentUser ? 'border-accent' : ''}">
                        <div class="rank-number">${rank}</div>
                        <div class="user-avatar avatar-aura-container ${user.equippedAura || ''}">
                            <img src="${user.avatar || 'https://ui-avatars.com/api/?name=' + user.name}" alt="${user.name}">
                        </div>
                        <div class="user-info">
                            <div class="user-name">${user.name} ${isCurrentUser ? '(Tú)' : ''}</div>
                            <div class="user-level">${user.rank || 'Estudiante'}</div>
                        </div>
                        <div class="user-xp">${user.totalXP.toLocaleString()} XP</div>
                    </div>
                `;
            }).join('');

            lucide.createIcons();
        }

        function updateStats(sorted) {
            const userRank = sorted.findIndex(u => u.id === currentUser.id) + 1;
            const userXP = calculateTotalXP(currentUser);
            const achievements = currentUser.achievements ? Object.keys(currentUser.achievements).length : 0;

            document.getElementById('your-rank').textContent = userRank || '-';
            document.getElementById('total-users').textContent = sorted.length;
            document.getElementById('your-xp').textContent = userXP.toLocaleString();
            document.getElementById('your-achievements').textContent = achievements;
        }

        // Theme toggle
        const themeToggle = document.getElementById('theme-toggle');
        if (themeToggle) {
            themeToggle.addEventListener('click', () => {
                document.documentElement.classList.toggle('dark');
                const isDark = document.documentElement.classList.contains('dark');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                lucide.createIcons();
            });
        }

        init();
    </script>
</body>
</html>
