<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status Code 418 - Estudiantes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <!-- Initialize CSS variables immediately to prevent flicker -->
    <script>
        (function() {
            const bgDay = 'https://i.pinimg.com/originals/71/f1/b9/71f1b924a56150104ec16828f2d31b7f.gif';
            const bgNight = 'https://i.pinimg.com/originals/4c/23/98/4c2398e6be397bb08b5cb70b2192d730.gif';
            document.documentElement.style.setProperty('--bg-day', `url('${bgDay}')`);
            document.documentElement.style.setProperty('--bg-night', `url('${bgNight}')`);
        })();
    </script>

    <!-- Firebase Modules -->
    <script type="module" src="assets/js/firebase-config.js"></script>
    <script type="module" src="assets/js/firebase-storage.js"></script>
    <script type="module" src="assets/js/predefined-profiles.js"></script>
    <script src="assets/js/cosmetic-effects.js"></script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☕</text></svg>">
    <link rel="stylesheet" href="assets/css/auras.css">
    <link rel="stylesheet" href="assets/css/theme.css">

    <!-- Theme Init -->
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            if (savedTheme === 'dark') document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
        })();
    </script>

    <style>
        :root {
            --background: #0f1016;
            --foreground: #e2e8f0;
            --border: #2d3748;
            --accent: #7aa2f7;
            --accent-hover: #5d8eea;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
        }

        .light {
            --background: #f8fafc;
            --foreground: #1e293b;
            --border: #cbd5e1;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
        }

        body {
            background: var(--background);
            color: var(--foreground);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        .app-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: rgba(36, 40, 59, 0.95);
            backdrop-filter: blur(10px);
            border-right: 1px solid var(--border);
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .sidebar-profile {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-avatar {
            width: 80px;
            height: 80px;
            margin: 0 auto 1rem;
            position: relative;
        }

        .sidebar-nav {
            flex: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            color: var(--foreground);
            transition: all 0.2s;
            cursor: pointer;
            margin-bottom: 0.5rem;
        }

        .nav-item:hover {
            background: rgba(122, 162, 247, 0.1);
            color: var(--accent);
        }

        .nav-item.active {
            background: var(--accent);
            color: white;
        }

        .main-content {
            margin-left: 260px;
            flex: 1;
            padding: 2rem;
            width: calc(100% - 260px);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .students-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .student-card {
            background: rgba(36, 40, 59, 0.9);
            border: 2px solid transparent;
            background-clip: padding-box;
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .student-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 16px;
            padding: 2px;
            background: linear-gradient(135deg, var(--border), rgba(122, 162, 247, 0.3));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .student-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(122, 162, 247, 0.2);
        }

        .student-card.unlocked:hover::before {
            background: linear-gradient(135deg, var(--accent), rgba(122, 162, 247, 0.6));
        }

        .student-card.locked {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .student-card.locked:hover {
            transform: none;
            box-shadow: none;
        }

        .student-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: 3px solid var(--border);
            margin: 0 auto 1rem;
            object-fit: cover;
        }

        .student-card.unlocked .student-avatar {
            border-color: var(--accent);
        }

        .student-card.locked .student-avatar {
            border-color: var(--border);
            filter: grayscale(50%);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .status-badge.unlocked {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .status-badge.locked {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .chat-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin-top: 1rem;
        }

        .chat-btn:hover {
            background: var(--accent-hover);
            transform: scale(1.02);
        }

        .chat-btn:disabled {
            background: var(--border);
            color: var(--foreground);
            cursor: not-allowed;
            transform: none;
        }

        .level-info {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 0.75rem;
        }

        .level-tag {
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .level-tag.web { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
        .level-tag.python { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .level-tag.ruby { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .level-tag.db { background: rgba(16, 185, 129, 0.2); color: #10b981; }

        .online-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--border);
            position: absolute;
            bottom: 0;
            right: 0;
            border: 2px solid var(--background);
        }

        .online-indicator.online {
            background: #10b981;
        }

        .avatar-wrapper {
            position: relative;
            display: inline-block;
        }

        .loading-overlay {
            position: fixed;
            inset: 0;
            background: #0f1016;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .filter-bar {
            background: rgba(36, 40, 59, 0.9);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--foreground);
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            background: rgba(122, 162, 247, 0.1);
            border-color: var(--accent);
        }

        .filter-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }
            .main-content {
                margin-left: 0;
                width: 100%;
            }
            .students-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="relative w-32 h-32 mb-8">
            <div class="absolute inset-0 border-4 border-t-purple-500 border-r-transparent border-b-blue-500 border-l-transparent rounded-full animate-spin"></div>
            <div class="absolute inset-2 border-4 border-t-transparent border-r-pink-500 border-b-transparent border-l-cyan-500 rounded-full animate-spin-reverse"></div>
        </div>
        <p class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-pink-600 tracking-wider animate-pulse font-mono">
            CARGANDO...
        </p>
    </div>

    <!-- App Container -->
    <div id="app-container" class="app-container hidden">
        <!-- Sidebar -->
        <aside class="sidebar">
            <!-- User Profile -->
            <div class="sidebar-profile">
                <div class="sidebar-avatar avatar-aura-container" id="sidebar-avatar-container">
                    <img id="sidebar-user-avatar" src="" class="w-full h-full rounded-full object-cover">
                </div>
                <h3 id="user-name" class="text-lg font-bold text-white mb-1">Alex Chen</h3>
                <span id="user-rank-badge" class="inline-block px-3 py-1 text-xs rounded-full bg-yellow-500/20 text-yellow-400 border border-yellow-500/30">Gold Member</span>
            </div>

            <!-- Navigation -->
            <nav class="sidebar-nav">
                <div class="nav-item" onclick="window.location.href='menu_inicio.html'">
                    <i data-lucide="home" class="w-5 h-5"></i>
                    <span>Inicio</span>
                </div>
                <div class="nav-item active" onclick="window.location.href='estudiantes.html'">
                    <i data-lucide="users" class="w-5 h-5"></i>
                    <span>Estudiantes</span>
                </div>
                <div class="nav-item" onclick="window.location.href='sandbox.html'">
                    <i data-lucide="code-2" class="w-5 h-5"></i>
                    <span>Sandbox</span>
                </div>
                <div class="nav-item" onclick="window.location.href='leaderboard.html'">
                    <i data-lucide="trophy" class="w-5 h-5"></i>
                    <span>Clasificación</span>
                </div>
                <div class="nav-item" onclick="window.location.href='tienda.html'">
                    <i data-lucide="shopping-bag" class="w-5 h-5"></i>
                    <span>Tienda</span>
                </div>
                <div class="nav-item" onclick="window.location.href='perfil_usuario.html'">
                    <i data-lucide="user" class="w-5 h-5"></i>
                    <span>Mi Perfil</span>
                </div>
            </nav>

            <!-- Logout -->
            <div class="nav-item" id="logout-btn" style="margin-top: auto;">
                <i data-lucide="log-out" class="w-5 h-5"></i>
                <span>Cerrar Sesión</span>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar -->
            <div class="top-bar">
                <div>
                    <h1 class="text-3xl font-bold text-white">Estudiantes</h1>
                    <p class="text-gray-400 mt-1">Conecta con otros estudiantes que han alcanzado el nivel 5</p>
                </div>
            </div>

            <!-- Filter Bar -->
            <div class="filter-bar">
                <button class="filter-btn active" data-filter="all">Todos</button>
                <button class="filter-btn" data-filter="unlocked">Desbloqueados</button>
                <button class="filter-btn" data-filter="online">En Línea</button>
            </div>

            <!-- Students Grid -->
            <div id="students-grid" class="students-grid">
                <!-- Students will be injected here -->
            </div>
        </main>
    </div>

    <script type="module">
        lucide.createIcons();
        import { 
            listenToUsers, 
            getUserFromFirestore,
            showLoading,
            hideLoading,
            checkConnection,
            updateHeartbeat,
            setOffline,
            isUserOnline
        } from './assets/js/firebase-config.js';
        
        import { showGlobalToast } from './assets/js/ui-utils.js';

        // Variable para el intervalo de heartbeat
        let heartbeatInterval = null;

        // Check if user has reached level 5 in any course
        function hasReachedLevel5(user) {
            const courses = ['webProgress', 'pythonProgress', 'rubyProgress', 'databaseProgress'];
            for (const course of courses) {
                const progress = user[course];
                if (progress && progress.completedLevels && progress.completedLevels.length >= 5) {
                    return true;
                }
            }
            return false;
        }

        // Get max level across all courses
        function getMaxLevel(user) {
            const courses = ['webProgress', 'pythonProgress', 'rubyProgress', 'databaseProgress'];
            const levels = { web: 0, python: 0, ruby: 0, db: 0 };
            
            if (user.webProgress?.completedLevels) levels.web = user.webProgress.completedLevels.length;
            if (user.pythonProgress?.completedLevels) levels.python = user.pythonProgress.completedLevels.length;
            if (user.rubyProgress?.completedLevels) levels.ruby = user.rubyProgress.completedLevels.length;
            if (user.databaseProgress?.completedLevels) levels.db = user.databaseProgress.completedLevels.length;
            
            return levels;
        }

        // Initialize page
        async function initPage() {
            if (!checkConnection()) return;

            const localSession = JSON.parse(localStorage.getItem('currentUser'));

            if (!localSession || !localSession.id) {
                console.warn('No session found, redirecting to login.');
                window.location.href = 'index.html';
                return;
            }

            try {
                const freshUser = await getUserFromFirestore(localSession.id);

                if (!freshUser) {
                    showGlobalToast('Sesión Expirada', 'Por favor ingresa de nuevo.', 'warning');
                    localStorage.removeItem('currentUser');
                    setTimeout(() => window.location.href = 'index.html', 2000);
                    return;
                }

                localStorage.setItem('currentUser', JSON.stringify(freshUser));

                // Iniciar heartbeat para marcar al usuario como online
                await updateHeartbeat(freshUser.id);
                // Configurar heartbeat cada 2 minutos
                heartbeatInterval = setInterval(() => {
                    updateHeartbeat(freshUser.id);
                }, 2 * 60 * 1000);

                // Marcar como offline al cerrar la página
                window.addEventListener('beforeunload', () => {
                    setOffline(freshUser.id);
                });

                renderUserProfile(freshUser);
                startRealTimeUpdates(freshUser);

                document.getElementById('loading-overlay').style.display = 'none';
                document.getElementById('app-container').classList.remove('hidden');

                // Logout
                const logoutBtn = document.getElementById('logout-btn');
                if(logoutBtn) {
                     logoutBtn.onclick = async () => {
                        if(confirm('¿Cerrar sesión?')) {
                            // Marcar como offline antes de cerrar sesión
                            await setOffline(freshUser.id);
                            if(window.purgeLocalStorage) window.purgeLocalStorage();
                            else localStorage.clear();
                            window.location.href = 'index.html';
                        }
                     };
                }

            } catch (err) {
                console.error('Page Init Error:', err);
                showGlobalToast('Error', 'Error cargando la página.', 'error');
            }
        }

        function renderUserProfile(user) {
            document.getElementById('user-name').textContent = user.name || 'Estudiante';
            document.getElementById('user-rank-badge').textContent = user.rank || 'Novato';
            
            const avatarImg = document.getElementById('sidebar-user-avatar');
            if (avatarImg) {
                avatarImg.src = user.avatar || 'https://ui-avatars.com/api/?name=' + (user.name || 'User');
                
                // Apply Aura
                import('./assets/js/predefined-profiles.js').then(({ PROFILE_AURAS }) => {
                    const auraId = user.equippedAura || 'aura-none';
                    const auraData = PROFILE_AURAS.find(f => f.id === auraId);
                    
                    const container = document.getElementById('sidebar-avatar-container');
                    if (container && auraData && auraData.cssClass) {
                        container.classList.add(auraData.cssClass);
                    }
                });
            }
        }

        function startRealTimeUpdates(currentUser) {
            listenToUsers((users) => {
                renderStudents(users, currentUser);
            });
        }

        function renderStudents(users, currentUser) {
            const grid = document.getElementById('students-grid');
            grid.innerHTML = '';

            // Filter out current user
            const otherUsers = users.filter(u => u.id !== currentUser.id);

            otherUsers.forEach(user => {
                const isUnlocked = hasReachedLevel5(user);
                const levels = getMaxLevel(user);
                // Usar isUserOnline para determinar si el usuario está online (basado en lastSeen)
                const isOnline = isUserOnline(user, 5); // 5 minutos de timeout

                const card = document.createElement('div');
                card.className = `student-card ${isUnlocked ? 'unlocked' : 'locked'}`;
                card.dataset.unlocked = isUnlocked;
                card.dataset.online = isOnline;

                card.innerHTML = `
                    <div class="text-center">
                        <div class="avatar-wrapper">
                            <img src="${user.avatar || 'https://ui-avatars.com/api/?name=' + user.name}"
                                 class="student-avatar"
                                 alt="${user.name}">
                            <div class="online-indicator ${isOnline ? 'online' : ''}"></div>
                        </div>
                        <h3 class="text-lg font-bold text-white mb-1">${user.name}</h3>
                        <span class="text-sm text-gray-400">${user.rank || 'Novato'}</span>

                        <div class="mt-3">
                            <span class="status-badge ${isUnlocked ? 'unlocked' : 'locked'}">
                                <i data-lucide="${isUnlocked ? 'unlock' : 'lock'}" class="w-3 h-3"></i>
                                ${isUnlocked ? 'Desbloqueado' : 'No Desbloqueado'}
                            </span>
                        </div>

                        <div class="level-info justify-center">
                            ${levels.web > 0 ? `<span class="level-tag web">Web: ${levels.web}</span>` : ''}
                            ${levels.python > 0 ? `<span class="level-tag python">Python: ${levels.python}</span>` : ''}
                            ${levels.ruby > 0 ? `<span class="level-tag ruby">Ruby: ${levels.ruby}</span>` : ''}
                            ${levels.db > 0 ? `<span class="level-tag db">DB: ${levels.db}</span>` : ''}
                        </div>

                        <button class="chat-btn"
                                ${!isUnlocked ? 'disabled' : ''}
                                onclick="${isUnlocked ? `openChat('${user.id}', '${user.name.replace(/'/g, "\\'")}')` : ''}">
                            <i data-lucide="message-circle" class="w-4 h-4 inline mr-1"></i>
                            ${isUnlocked ? 'Chatear' : 'Nivel 5 Requerido'}
                        </button>
                    </div>
                `;

                grid.appendChild(card);
            });

            lucide.createIcons();
        }

        // Make openChat available globally
        window.openChat = function(userId, userName) {
            // Store chat info and redirect
            localStorage.setItem('chatWith', JSON.stringify({ id: userId, name: userName }));
            window.location.href = 'chat.html';
        };

        // Filter functionality
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                const filter = btn.dataset.filter;
                const cards = document.querySelectorAll('.student-card');

                cards.forEach(card => {
                    const isUnlocked = card.dataset.unlocked === 'true';
                    const isOnline = card.dataset.online === 'true';

                    if (filter === 'all') {
                        card.style.display = 'block';
                    } else if (filter === 'unlocked') {
                        card.style.display = isUnlocked ? 'block' : 'none';
                    } else if (filter === 'online') {
                        card.style.display = isOnline ? 'block' : 'none';
                    }
                });
            });
        });

        // Limpiar intervalo al descargar la página
        window.addEventListener('unload', () => {
            if (heartbeatInterval) {
                clearInterval(heartbeatInterval);
            }
        });

        // Initialize on load
        initPage();
    </script>
</body>
</html>
