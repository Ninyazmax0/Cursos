<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status Code 418 - Bandeja de Entrada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <!-- Initialize CSS variables immediately to prevent flicker -->
    <script>
        (function() {
            const bgDay = 'https://i.pinimg.com/originals/71/f1/b9/71f1b924a56150104ec16828f2d31b7f.gif';
            const bgNight = 'https://i.pinimg.com/originals/4c/23/98/4c2398e6be397bb08b5cb70b2192d730.gif';
            document.documentElement.style.setProperty('--bg-day', `url('${bgDay}')`);
            document.documentElement.style.setProperty('--bg-night', `url('${bgNight}')`);
        })();
    </script>

    <!-- Firebase Modules -->
    <script type="module" src="assets/js/firebase-config.js"></script>
    <script type="module" src="assets/js/firebase-storage.js"></script>
    <script type="module" src="assets/js/predefined-profiles.js"></script>
    <script src="assets/js/cosmetic-effects.js"></script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☕</text></svg>">
    <link rel="stylesheet" href="assets/css/auras.css">
    <link rel="stylesheet" href="assets/css/theme.css">

    <!-- Theme Init -->
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            if (savedTheme === 'dark') document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
        })();
    </script>

    <style>
        :root {
            --background: #0f1016;
            --foreground: #e2e8f0;
            --border: #2d3748;
            --accent: #7aa2f7;
            --accent-hover: #5d8eea;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
        }

        .light {
            --background: #f8fafc;
            --foreground: #1e293b;
            --border: #cbd5e1;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
        }

        body {
            background: var(--background);
            color: var(--foreground);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        .app-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: rgba(36, 40, 59, 0.95);
            backdrop-filter: blur(10px);
            border-right: 1px solid var(--border);
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .sidebar-profile {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-avatar {
            width: 80px;
            height: 80px;
            margin: 0 auto 1rem;
            position: relative;
        }

        .sidebar-nav {
            flex: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            color: var(--foreground);
            transition: all 0.2s;
            cursor: pointer;
            margin-bottom: 0.5rem;
        }

        .nav-item:hover {
            background: rgba(122, 162, 247, 0.1);
            color: var(--accent);
        }

        .nav-item.active {
            background: var(--accent);
            color: white;
        }

        .main-content {
            margin-left: 260px;
            flex: 1;
            padding: 2rem;
            width: calc(100% - 260px);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .inbox-container {
            background: rgba(36, 40, 59, 0.9);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }

        .inbox-header {
            background: rgba(45, 55, 72, 0.5);
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .chat-list {
            display: flex;
            flex-direction: column;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
        }

        .chat-item:hover {
            background: rgba(122, 162, 247, 0.1);
        }

        .chat-item.unread {
            background: rgba(122, 162, 247, 0.05);
        }

        .chat-item.unread:hover {
            background: rgba(122, 162, 247, 0.15);
        }

        .chat-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--border);
            flex-shrink: 0;
        }

        .chat-item.unread .chat-avatar {
            border-color: var(--accent);
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-name {
            font-weight: 600;
            color: var(--foreground);
            margin-bottom: 0.25rem;
        }

        .chat-item.unread .chat-name {
            color: var(--accent);
        }

        .chat-preview {
            font-size: 0.875rem;
            color: rgba(226, 232, 240, 0.6);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.5rem;
        }

        .chat-time {
            font-size: 0.75rem;
            color: rgba(226, 232, 240, 0.5);
        }

        .unread-badge {
            background: var(--accent);
            color: white;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.25rem 0.5rem;
            border-radius: 12px;
            min-width: 24px;
            text-align: center;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            text-align: center;
        }

        .empty-state i {
            width: 64px;
            height: 64px;
            color: var(--border);
            margin-bottom: 1rem;
        }

        .loading-overlay {
            position: fixed;
            inset: 0;
            background: #0f1016;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .back-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--foreground);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-btn:hover {
            background: rgba(122, 162, 247, 0.1);
            border-color: var(--accent);
            color: var(--accent);
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }
            .main-content {
                margin-left: 0;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="relative w-32 h-32 mb-8">
            <div class="absolute inset-0 border-4 border-t-purple-500 border-r-transparent border-b-blue-500 border-l-transparent rounded-full animate-spin"></div>
            <div class="absolute inset-2 border-4 border-t-transparent border-r-pink-500 border-b-transparent border-l-cyan-500 rounded-full animate-spin-reverse"></div>
        </div>
        <p class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-pink-600 tracking-wider animate-pulse font-mono">
            CARGANDO...
        </p>
    </div>

    <!-- App Container -->
    <div id="app-container" class="app-container hidden">
        <!-- Sidebar -->
        <aside class="sidebar">
            <!-- User Profile -->
            <div class="sidebar-profile">
                <div class="sidebar-avatar avatar-aura-container" id="sidebar-avatar-container">
                    <img id="sidebar-user-avatar" src="" class="w-full h-full rounded-full object-cover">
                </div>
                <h3 id="user-name" class="text-lg font-bold text-white mb-1">Alex Chen</h3>
                <span id="user-rank-badge" class="inline-block px-3 py-1 text-xs rounded-full bg-yellow-500/20 text-yellow-400 border border-yellow-500/30">Gold Member</span>
            </div>

            <!-- Navigation -->
            <nav class="sidebar-nav">
                <div class="nav-item" onclick="window.location.href='menu_inicio.html'">
                    <i data-lucide="home" class="w-5 h-5"></i>
                    <span>Inicio</span>
                </div>
                <div class="nav-item" onclick="window.location.href='estudiantes.html'">
                    <i data-lucide="users" class="w-5 h-5"></i>
                    <span>Estudiantes</span>
                </div>
                <div class="nav-item active" onclick="window.location.href='inbox.html'">
                    <i data-lucide="inbox" class="w-5 h-5"></i>
                    <span>Bandeja de Entrada</span>
                </div>
                <div class="nav-item" onclick="window.location.href='sandbox.html'">
                    <i data-lucide="code-2" class="w-5 h-5"></i>
                    <span>Sandbox</span>
                </div>
                <div class="nav-item" onclick="window.location.href='leaderboard.html'">
                    <i data-lucide="trophy" class="w-5 h-5"></i>
                    <span>Clasificación</span>
                </div>
                <div class="nav-item" onclick="window.location.href='tienda.html'">
                    <i data-lucide="shopping-bag" class="w-5 h-5"></i>
                    <span>Tienda</span>
                </div>
                <div class="nav-item" onclick="window.location.href='perfil_usuario.html'">
                    <i data-lucide="user" class="w-5 h-5"></i>
                    <span>Mi Perfil</span>
                </div>
            </nav>

            <!-- Logout -->
            <div class="nav-item" id="logout-btn" style="margin-top: auto;">
                <i data-lucide="log-out" class="w-5 h-5"></i>
                <span>Cerrar Sesión</span>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar -->
            <div class="top-bar">
                <div>
                    <h1 class="text-3xl font-bold text-white">Bandeja de Entrada</h1>
                    <p class="text-gray-400 mt-1">Tus conversaciones</p>
                </div>
                <button class="back-btn" onclick="window.location.href='menu_inicio.html'">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i>
                    Volver
                </button>
            </div>

            <!-- Inbox Container -->
            <div class="inbox-container">
                <div class="inbox-header">
                    <h2 class="text-xl font-bold text-white">Mensajes</h2>
                </div>
                <div id="chat-list" class="chat-list">
                    <!-- Chats will be injected here -->
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        lucide.createIcons();
        import { 
            getUserFromFirestore,
            getAllUsersFromFirestore,
            showLoading,
            hideLoading,
            checkConnection,
            db,
            collection,
            query,
            orderBy,
            onSnapshot,
            getDocs
        } from './assets/js/firebase-config.js';
        
        import { showGlobalToast } from './assets/js/ui-utils.js';

        let currentUser = null;
        let chatListeners = [];

        // Check if user has reached level 5 in any course
        function hasReachedLevel5(user) {
            const courses = ['webProgress', 'pythonProgress', 'rubyProgress', 'databaseProgress'];
            for (const course of courses) {
                const progress = user[course];
                if (progress && progress.completedLevels && progress.completedLevels.length >= 5) {
                    return true;
                }
            }
            return false;
        }

        // Generate chat ID
        function generateChatId(userId1, userId2) {
            return [userId1, userId2].sort().join('_');
        }

        // Initialize page
        async function initPage() {
            if (!checkConnection()) return;
            
            const localSession = JSON.parse(localStorage.getItem('currentUser'));
            
            if (!localSession || !localSession.id) {
                console.warn('No session found, redirecting to login.');
                window.location.href = 'index.html';
                return;
            }

            try {
                currentUser = await getUserFromFirestore(localSession.id);
                
                if (!currentUser) {
                    showGlobalToast('Sesión Expirada', 'Por favor ingresa de nuevo.', 'warning');
                    localStorage.removeItem('currentUser');
                    setTimeout(() => window.location.href = 'index.html', 2000);
                    return;
                }
                
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                
                // Check if user has reached level 5
                if (!hasReachedLevel5(currentUser)) {
                    showGlobalToast('Acceso Denegado', 'Debes alcanzar el nivel 5 en algún curso para usar el chat.', 'error');
                    setTimeout(() => window.location.href='menu_inicio.html', 2000);
                    return;
                }
                
                renderUserProfile(currentUser);
                loadChats();

                document.getElementById('loading-overlay').style.display = 'none';
                document.getElementById('app-container').classList.remove('hidden');

                // Logout
                const logoutBtn = document.getElementById('logout-btn');
                if(logoutBtn) {
                     logoutBtn.onclick = () => {
                        if(confirm('¿Cerrar sesión?')) {
                            if(window.purgeLocalStorage) window.purgeLocalStorage();
                            else localStorage.clear();
                            window.location.href = 'index.html';
                        }
                     };
                }

            } catch (err) {
                console.error('Page Init Error:', err);
                showGlobalToast('Error', 'Error cargando la página.', 'error');
            }
        }

        function renderUserProfile(user) {
            document.getElementById('user-name').textContent = user.name || 'Estudiante';
            document.getElementById('user-rank-badge').textContent = user.rank || 'Novato';
            
            const avatarImg = document.getElementById('sidebar-user-avatar');
            if (avatarImg) {
                avatarImg.src = user.avatar || 'https://ui-avatars.com/api/?name=' + (user.name || 'User');
                
                // Apply Aura
                import('./assets/js/predefined-profiles.js').then(({ PROFILE_AURAS }) => {
                    const auraId = user.equippedAura || 'aura-none';
                    const auraData = PROFILE_AURAS.find(f => f.id === auraId);
                    
                    const container = document.getElementById('sidebar-avatar-container');
                    if (container && auraData && auraData.cssClass) {
                        container.classList.add(auraData.cssClass);
                    }
                });
            }
        }

        async function loadChats() {
            try {
                const users = await getAllUsersFromFirestore();
                const otherUsers = users.filter(u => u.id !== currentUser.id);
                
                const chatList = document.getElementById('chat-list');
                chatList.innerHTML = '';
                
                let hasChats = false;
                
                // Listen to each chat
                otherUsers.forEach(otherUser => {
                    const chatId = generateChatId(currentUser.id, otherUser.id);
                    const messagesRef = collection(db, 'chats', chatId, 'messages');
                    const messagesQuery = query(messagesRef, orderBy('timestamp', 'desc'));
                    
                    const unsubscribe = onSnapshot(messagesQuery, (snapshot) => {
                        if (snapshot.empty) return;
                        
                        hasChats = true;
                        
                        // Get latest message
                        const latestMessage = snapshot.docs[0].data();
                        
                        // Count unread messages
                        let unreadCount = 0;
                        snapshot.forEach(doc => {
                            const message = doc.data();
                            if (message.senderId !== currentUser.id && !message.read) {
                                unreadCount++;
                            }
                        });
                        
                        // Check if chat item already exists
                        let chatItem = document.getElementById(`chat-${otherUser.id}`);
                        
                        if (!chatItem) {
                            chatItem = document.createElement('div');
                            chatItem.id = `chat-${otherUser.id}`;
                            chatItem.className = `chat-item ${unreadCount > 0 ? 'unread' : ''}`;
                            chatItem.onclick = () => openChat(otherUser.id, otherUser.name);
                            
                            chatList.appendChild(chatItem);
                        } else {
                            chatItem.className = `chat-item ${unreadCount > 0 ? 'unread' : ''}`;
                        }
                        
                        const time = latestMessage.timestamp 
                            ? new Date(latestMessage.timestamp.toDate ? latestMessage.timestamp.toDate() : latestMessage.timestamp).toLocaleDateString('es-ES', { month: 'short', day: 'numeric' })
                            : '';
                        
                        chatItem.innerHTML = `
                            <img src="${otherUser.avatar || 'https://ui-avatars.com/api/?name=' + otherUser.name}" 
                                 class="chat-avatar" 
                                 alt="${otherUser.name}">
                            <div class="chat-info">
                                <div class="chat-name">${otherUser.name}</div>
                                <div class="chat-preview">${latestMessage.senderId === currentUser.id ? 'Tú: ' : ''}${escapeHtml(latestMessage.text)}</div>
                            </div>
                            <div class="chat-meta">
                                <span class="chat-time">${time}</span>
                                ${unreadCount > 0 ? `<span class="unread-badge">${unreadCount}</span>` : ''}
                            </div>
                        `;
                        
                        // Sort chats by latest message
                        sortChats();
                    });
                    
                    chatListeners.push(unsubscribe);
                });
                
                // Show empty state if no chats
                setTimeout(() => {
                    if (!hasChats) {
                        chatList.innerHTML = `
                            <div class="empty-state">
                                <i data-lucide="inbox"></i>
                                <p class="text-gray-400">No tienes mensajes aún</p>
                                <button onclick="window.location.href='estudiantes.html'" class="mt-4 px-4 py-2 bg-accent text-white rounded-lg hover:bg-accent-hover transition-colors">
                                    Buscar Estudiantes
                                </button>
                            </div>
                        `;
                        lucide.createIcons();
                    }
                }, 1000);
                
            } catch (err) {
                console.error('Error loading chats:', err);
            }
        }

        function sortChats() {
            const chatList = document.getElementById('chat-list');
            const items = Array.from(chatList.children);
            
            // Sort by unread status first, then by time (we'll use the order they were updated)
            items.sort((a, b) => {
                const aUnread = a.classList.contains('unread');
                const bUnread = b.classList.contains('unread');
                
                if (aUnread && !bUnread) return -1;
                if (!aUnread && bUnread) return 1;
                return 0;
            });
            
            items.forEach(item => chatList.appendChild(item));
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function openChat(userId, userName) {
            localStorage.setItem('chatWith', JSON.stringify({ id: userId, name: userName }));
            window.location.href = 'chat.html';
        }

        // Initialize on load
        initPage();
    </script>
</body>
</html>
