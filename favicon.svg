<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Gradiente Tokyo Night (Azul Neón a Magenta/Cyan) -->
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7aa2f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7dcfff;stop-opacity:1" />
    </linearGradient>
    
    <!-- Sombra neón -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Fondo Rectangular (Estilo Bloque de Código) -->
  <rect x="5" y="15" width="90" height="70" rx="15" fill="#1a1b26" stroke="url(#neonGrad)" stroke-width="4" />
  
  <!-- Símbolos de Etiqueta < > -->
  <path d="M15 35 L5 50 L15 65" fill="none" stroke="#bb9af7" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M85 35 L95 50 L85 65" fill="none" stroke="#bb9af7" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Número 418 -->
  <text x="50" y="65" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="32" font-weight="900" fill="white" text-anchor="middle" filter="url(#glow)">418</text>
  
  <!-- Pequeño adorno de píxel/terminal -->
  <rect x="70" y="25" width="8" height="2" fill="#7aa2f7" opacity="0.6" />
</svg>
